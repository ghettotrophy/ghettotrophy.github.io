<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANGRETTA[LESS]</title>
    
    <link rel="icon" type="image/png" href="https://img1.pic.in.th/images/cgtlogo2.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #fff; 
            --secondary: #888; 
            --bg: #050505; 
            --accent: #ff0000;
            --smooth: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            opacity: 0; /* For fade-in effect */
            animation: fadeInPage 1.5s forwards;
        }

        @keyframes fadeInPage {
            to { opacity: 1; }
        }

        /* --- Layout --- */
        .top-nav { 
            position: fixed; top: 20px; width: 95%; max-width: 1400px; 
            background: rgba(17, 17, 17, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 50px; padding: 8px; display: flex; 
            align-items: center; z-index: 1000; backdrop-filter: blur(15px);
            transition: var(--smooth);
        }

        .house-tag { 
            background: #fff; color: #000; font-family: 'Orbitron'; 
            font-weight: 900; font-size: 0.7rem; padding: 6px 18px; 
            border-radius: 20px; margin-right: 15px; text-transform: uppercase;
            transition: var(--smooth);
        }
        .house-link:hover .house-tag { transform: scale(0.95); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .house-name { font-family: 'Orbitron'; font-size: 0.75rem; letter-spacing: 2px; color: #eee; text-transform: uppercase; }

        /* Background Effects */
        .bg-grid { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; z-index: -1; filter: grayscale(1) brightness(0.15); transform: scale(1.1); transition: 2s ease; }
        body:hover .bg-grid { transform: scale(1.05); filter: grayscale(1) brightness(0.2); }
        .bg-card { background: url('https://img2.pic.in.th/475638765_916266083879572_6694404597216444166_n.jpg') center/cover; border-radius: 8px; transition: 1s ease; }
        
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, #000 100%); z-index: 0; }

        /* Content Smoothness */
        .main-content { position: relative; z-index: 10; text-align: center; width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 30px; align-items: center; }
        
        .brand-name { 
            font-family: 'Orbitron'; font-size: 5.5rem; font-weight: 900; 
            letter-spacing: 25px; border-right: 6px solid #fff; padding-right: 15px; 
            text-shadow: 0 0 30px rgba(255,255,255,0.2); text-transform: uppercase; 
            line-height: 1; min-height: 100px; display: flex; align-items: center; 
        }
        
        .brand-subtext { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 12px; color: var(--secondary); margin-top: 5px; opacity: 0.6; }

        .header-wrapper { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; color: #444; font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 6px; }
        .divider-line { height: 1px; width: 60px; background: rgba(255, 255, 255, 0.05); }

        /* Interactive Plate */
        .pennales-plate { 
            background: rgba(17, 17, 17, 0.4); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; padding: 25px 70px; 
            text-decoration: none; color: #fff; 
            transition: var(--smooth); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            backdrop-filter: blur(10px); display: block; 
        }
        
        .pennales-plate:hover { 
            border-color: #fff; transform: translateY(-10px) scale(1.02); 
            background: #fff; color: #000; 
            box-shadow: 0 30px 60px rgba(255,255,255,0.1);
        }
        
        .pennales-plate:hover .plate-sub { color: #555; }
        .plate-title { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 900; letter-spacing: 6px; display: block; }
        .plate-sub { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--secondary); letter-spacing: 4px; text-transform: uppercase; transition: 0.3s; }

        /* Bottom Music UI Smoothness */
        .bottom-ui { position: fixed; bottom: 30px; width: 95%; display: flex; justify-content: space-between; align-items: flex-end; z-index: 100; }
        .music-mini-player { 
            display: flex; align-items: center; gap: 15px; 
            background: rgba(10, 10, 10, 0.7); 
            padding: 10px 20px; border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 10px; backdrop-filter: blur(10px);
            transition: var(--smooth);
        }
        .music-mini-player:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }
        .album-art { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        @media (max-width: 768px) { 
            .brand-name { font-size: 2.2rem; letter-spacing: 10px; border-right: 3px solid #fff; } 
            .pennales-plate { padding: 20px 40px; }
        }
    </style>
</head>
<body id="mainBody">

    <div class="top-nav">
        <a href="https://discord.gg/oneless" target="_blank" class="house-link" style="text-decoration:none;">
            <div class="house-tag">ONELESS</div>
        </a>
        <div class="house-name">PROJECT</div>
    </div>

    <div class="bg-grid">
        <div class="bg-card"></div><div class="bg-card"></div><div class="bg-card"></div>
        <div class="bg-card"></div><div class="bg-card"></div><div class="bg-card"></div>
    </div>
    <div class="overlay"></div>

    <div class="main-content">
        <div class="brand-header">
            <h1 class="brand-name" id="typewriter"></h1>
            <div class="brand-subtext">ALL WAY TO STAR ONCELESS</div>
        </div>

        <div class="center-ui-group" style="margin-top:20px;">
            <div class="header-wrapper">
                <div class="divider-line"></div>MEMBER OFFICIAL<div class="divider-line"></div>
            </div>
            <a href="https://member.changretta.site/#" target="_blank" class="pennales-plate">
                <span class="plate-title">CHANGRETTA</span>
                <span class="plate-sub">LEADER</span>
            </a>
        </div>
    </div>

    <div class="bottom-ui">
        <div style="color: rgba(255,255,255,0.1); font-weight: bold; letter-spacing: 3px; font-size: 0.6rem; font-family: 'Orbitron';">SYSTEM DESIGN BY OSHI</div>
        
        <div class="music-mini-player">
            <img src="" id="displayCover" class="album-art" alt="Art">
            <div class="song-details">
                <h4 id="displayName" style="font-size: 0.7rem; color: #fff; letter-spacing: 1px;">-</h4>
                <p style="font-size: 0.5rem; color: #444; letter-spacing: 2px; font-family: 'Orbitron';">NOW PLAYING</p>
            </div>
            <button onclick="togglePlayPause()" id="playBtn" style="background:none; border:none; color:#fff; cursor:pointer; margin-left:15px; font-size: 0.8rem; transition: 0.3s;">
                <i class="fas fa-pause"></i>
            </button>
        </div>
    </div>

    <div id="yt-player" style="display:none;"></div>

    <script>
        // Firebase initialization (Same URL)
        const firebaseConfig = { databaseURL: "https://calvyn-999ea-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Smooth Typewriter
        const textElement = document.getElementById('typewriter'), text = "CHANGRETTA";
        let index = 0, isDeleting = false;
        function type() {
            let speed = isDeleting ? 80 : 200;
            textElement.innerText = text.substring(0, index);
            if (!isDeleting && index < text.length) index++;
            else if (isDeleting && index > 0) index--;
            else { isDeleting = !isDeleting; speed = isDeleting ? 3000 : 800; }
            setTimeout(type, speed);
        }

        // Music System
        var player;
        let currentVid = "";

        function onYouTubeIframeAPIReady() {
            db.ref('changretta_config/music').on('value', snap => {
                const m = snap.val() || { id: 'xy3AcmW0lrQ', name: 'End of Beginning', cover: 'https://i.ytimg.com/vi/xy3AcmW0lrQ/maxresdefault.jpg' };
                document.getElementById('displayName').innerText = m.name.toUpperCase();
                document.getElementById('displayCover').src = m.cover;
                
                if (currentVid !== m.id) {
                    currentVid = m.id;
                    if (!player) {
                        player = new YT.Player('yt-player', {
                            height: '0', width: '0', videoId: m.id,
                            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': m.id },
                            events: { 'onReady': (e) => e.target.setVolume(30) }
                        });
                    } else {
                        player.loadVideoById(m.id);
                    }
                }
            });
        }

        function togglePlayPause() {
            const btnIcon = document.querySelector('#playBtn i');
            if (player && player.getPlayerState() === 1) { 
                player.pauseVideo(); 
                btnIcon.className = "fas fa-play"; 
            }
            else if (player) { 
                player.playVideo(); 
                btnIcon.className = "fas fa-pause"; 
            }
        }

        // Interactions
        window.onload = () => {
            type();
            // Optional: Subtle parallax or mouse move effects can be added here
        };

        document.body.addEventListener('click', () => {
            if(player && player.playVideo) player.playVideo();
        }, { once: true });
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
    </script>
</body>
</html>

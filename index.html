<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(17, 17, 17, 0.9);
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --fb-color: #1877f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6; 
            transition: background 0.5s ease;
        }

        /* --- Weather Canvas --- */
        #weather-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI Elements --- */
        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 10000; }
        .notify { background: #202124; border-radius: 4px; padding: 12px 24px; color: #fff; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; margin-top: 10px; animation: slideUp 0.3s ease-out; min-width: 250px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 7000; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
        .custom-modal { background: #1a1c1e; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }

        .top-nav { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .config-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; font-weight: bold; }
        .config-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        .hero { padding: 160px 20px 60px; text-align: center; animation: slideUp 0.8s ease; position: relative; z-index: 100; }
        .hero img { max-width: 140px; margin-bottom: 25px; filter: drop-shadow(0 0 20px var(--accent)); transition: var(--transition); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(28px, 6vw, 60px); letter-spacing: 12px; margin-bottom: 10px; color: var(--accent); }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 100; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; transition: var(--transition); position: relative; backdrop-filter: blur(5px); }
        .member-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .avatar { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        .rank-tag { font-family: 'Orbitron'; font-size: 9px; font-weight: bold; padding: 3px 10px; border-radius: 4px; color: #000; text-transform: uppercase; letter-spacing: 1px; }
        .fb-link { color: var(--fb-color); font-size: 20px; margin-left: auto; transition: var(--transition); }

        /* --- Admin Dashboard --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 6000; overflow-y: auto; padding: 40px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .admin-card { background: #141414; padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px;}
        input, select { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; margin-bottom: 15px; font-family: 'Inter'; }
        label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 5px; font-family: 'Orbitron'; letter-spacing: 1px; }
        .btn-save { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; transition: 0.3s; }

        .music-ctrl { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; transition: var(--transition); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #yt-player-container { position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0; }

        .util-list-item { background: #000; padding: 12px; border-radius: 6px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .util-actions { display: flex; gap: 15px; }
        .util-actions i { cursor: pointer; transition: 0.2s; }
        .util-actions i:hover { color: var(--accent); }
    </style>
</head>
<body>

    <canvas id="weather-canvas"></canvas>
    <div id="notification-container"></div>
    <div id="yt-player-container"><div id="player"></div></div>

    <nav class="top-nav">
        <div style="font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px;">
            MEMBERS: <span id="countNum" style="color:var(--accent)">0</span>
        </div>
        <button class="config-btn" onclick="openModal('loginModal')"><i class="fa-solid fa-shield-halved"></i> ADMIN</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:10px; opacity:0.5; letter-spacing:5px;">MEMBER ROLE SYSTEM</p>
    </header>

    <div id="memberList" class="member-grid"></div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 30px;">
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">ADMIN DASHBOARD</h2>
            <button class="config-btn" style="background:#ff4444; color:#fff;" onclick="logoutAdmin()">CLOSE PANEL</button>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-gears"></i> SITE CONFIG</h3>
                <label>SITE NAME</label><input type="text" id="configSiteName">
                <label>DESCRIPTION</label><input type="text" id="configSiteDesc">
                <label>THEME COLOR</label><input type="color" id="configThemeColor" style="height:45px; padding:5px;">
                <label>FAVICON URL</label><input type="text" id="configFavicon">
                <label>BACKGROUND URL</label><input type="text" id="configBgUrl">
                <label>WEATHER SYSTEM</label>
                <select id="configWeather">
                    <option value="none">OFF</option>
                    <option value="snow">SNOW</option>
                    <option value="rain">RAIN</option>
                    <option value="sun">SUNLIGHT</option>
                </select>
                <label>LOGO URL</label><input type="text" id="configLogoUrl">
                <button class="btn-save" style="background:var(--accent);" onclick="saveConfig()">SAVE SITE</button>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-tags"></i> ROLES</h3>
                <label>NEW ROLE NAME</label><input type="text" id="newRoleName" placeholder="Admin, VIP, etc.">
                <label>ROLE COLOR</label><input type="color" id="newRoleColor" value="#ffc107" style="height:40px;">
                <button class="btn-save" style="background:#fff; color:#000;" onclick="addRole()">CREATE ROLE</button>
                <div id="roleListContainer" style="margin-top:15px;"></div>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-link"></i> LINK & IMAGE UTILS</h3>
                <label>LINK NAME (สำหรับบันทึก)</label>
                <input type="text" id="utilName" placeholder="เช่น โลโก้แก๊ง, รูปพื้นหลัง...">
                <label>URL</label>
                <input type="text" id="utilUrl" placeholder="วางลิ้งก์ที่นี่...">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-save" style="background:var(--accent); flex: 1;" onclick="saveUtil()">SAVE LINK</button>
                    <button class="btn-save" style="background:#fff; color:#000; flex: 1;" onclick="copyInputUrl()">COPY LINK</button>
                </div>
                <div id="utilListContainer" style="margin-top:20px; max-height: 300px; overflow-y: auto; padding-right: 5px;"></div>
            </div>

            <div class="admin-card" style="grid-column: 1 / -1;">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-users"></i> MEMBER MANAGEMENT</h3>
                <div class="admin-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div>
                        <label>NAME</label><input type="text" id="memName">
                        <label>AVATAR URL</label><input type="text" id="memImg">
                    </div>
                    <div>
                        <label>FACEBOOK URL</label><input type="text" id="memFb">
                        <label>ASSIGN ROLE</label><select id="memRole"></select>
                    </div>
                </div>
                <input type="hidden" id="editMemId">
                <button id="memBtn" class="btn-save" style="background:var(--accent);" onclick="saveMember()">ADD NEW MEMBER</button>
                <div id="adminMemberList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Init ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player, musicData = { id: 'PAMYc_MkqkM', start: 40 }, currentRoles = {};

        // --- Utils Logic (New) ---
        let savedUtils = JSON.parse(localStorage.getItem('ghetto_utils')) || [];

        function saveUtil() {
            const name = document.getElementById('utilName').value;
            const url = document.getElementById('utilUrl').value;
            if(!name || !url) return showNotify("กรุณากรอกข้อมูลให้ครบ");
            
            savedUtils.push({ name, url, id: Date.now() });
            localStorage.setItem('ghetto_utils', JSON.stringify(savedUtils));
            renderUtils();
            document.getElementById('utilName').value = '';
            document.getElementById('utilUrl').value = '';
            showNotify("บันทึกลิ้งก์แล้ว");
        }

        function renderUtils() {
            const container = document.getElementById('utilListContainer');
            container.innerHTML = savedUtils.map(item => `
                <div class="util-list-item">
                    <span style="font-size:12px; font-weight:600;">${item.name}</span>
                    <div class="util-actions">
                        <i class="fa-solid fa-copy" onclick="copyText('${item.url}')" title="Copy Link"></i>
                        <i class="fa-solid fa-trash" style="color:#ff4444" onclick="deleteUtil(${item.id})"></i>
                    </div>
                </div>
            `).join('');
        }

        function deleteUtil(id) {
            savedUtils = savedUtils.filter(i => i.id !== id);
            localStorage.setItem('ghetto_utils', JSON.stringify(savedUtils));
            renderUtils();
        }

        function copyInputUrl() {
            const url = document.getElementById('utilUrl').value;
            if(url) copyText(url);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            showNotify("คัดลอกลิ้งก์แล้ว!");
        }

        // --- Weather & Site Logic ---
        // (ส่วนนี้ใช้โค้ดเดิมของคุณทั้งหมด)
        const canvas = document.getElementById('weather-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [], weatherType = 'none';

        function initWeather() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; if(weatherType === 'none') return;
            for(let i=0; i<(weatherType==='rain'?150:80); i++) {
                particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*2+1, size: Math.random()*3+1, opacity: Math.random() });
            }
        }

        function drawWeather() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(weatherType === 'none') return;
            ctx.fillStyle = weatherType === 'rain' ? '#44aaff' : '#ffffff';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity; ctx.beginPath();
                if(weatherType === 'rain') { ctx.rect(p.x, p.y, 1, p.size*5); p.y += p.v*5; }
                else if(weatherType === 'sun') { ctx.arc(p.x, p.y, p.size*5, 0, Math.PI*2); p.y -= p.v*0.5; p.x += Math.sin(p.y/50); }
                else { ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); p.y += p.v; p.x += Math.sin(p.y/100); }
                ctx.fill();
                if(p.y > canvas.height) p.y = -20; if(p.y < -50) p.y = canvas.height+20;
            });
            requestAnimationFrame(drawWeather);
        }

        // --- Firebase Listeners ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteLogo').src = d.logo || '';
            if(d.bgUrl) document.body.style.backgroundImage = `url('${d.bgUrl}')`;
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
            weatherType = d.weather || 'none';
            initWeather(); drawWeather();
        });

        db.ref('roles').on('value', snap => {
            currentRoles = snap.val() || {};
            let options = '<option value="">NO ROLE</option>', listHtml = '';
            Object.keys(currentRoles).forEach(id => {
                options += `<option value="${id}">${currentRoles[id].name}</option>`;
                listHtml += `<div style="display:flex; justify-content:space-between; padding:8px; background:#000; margin-bottom:5px; border-radius:4px;">
                    <span style="color:${currentRoles[id].color}">${currentRoles[id].name}</span>
                    <i class="fa-solid fa-trash" onclick="db.ref('roles').child('${id}').remove()"></i>
                </div>`;
            });
            document.getElementById('memRole').innerHTML = options;
            document.getElementById('roleListContainer').innerHTML = listHtml;
        });

        // --- Other System Functions ---
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                document.getElementById('adminPanel').style.display = 'block';
            } else { alert("WRONG PASS"); }
        }

        function saveConfig() {
            const data = {
                name: document.getElementById('configSiteName').value,
                desc: document.getElementById('configSiteDesc').value,
                themeColor: document.getElementById('configThemeColor').value,
                logo: document.getElementById('configLogoUrl').value,
                favicon: document.getElementById('configFavicon').value,
                bgUrl: document.getElementById('configBgUrl').value,
                weather: document.getElementById('configWeather').value
            };
            db.ref('config').set(data).then(() => showNotify("SITE CONFIG SAVED"));
        }

        function addRole() {
            const name = document.getElementById('newRoleName').value;
            const color = document.getElementById('newRoleColor').value;
            if(name) db.ref('roles').push({ name, color });
        }

        function showNotify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notify';
            toast.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--accent)"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function logoutAdmin() { location.reload(); }
        
        // Start init
        renderUtils();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.2);
            --bg: #000000;
            --card-bg: #111111;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
        }

        /* --- Header & Navigation --- */
        .top-nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .member-counter-top {
            font-family: 'Orbitron';
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .logo-text { font-family: 'Orbitron'; font-weight: 700; letter-spacing: 3px; font-size: 1.2rem; }
        .nav-btns { display: flex; gap: 20px; }
        .nav-btn { color: #888; text-decoration: none; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .nav-btn:hover { color: #fff; }

        /* --- Hero Section --- */
        .hero-section { text-align: center; padding: 60px 20px; }
        .main-logo { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .hero-title { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 8px; text-transform: uppercase; text-shadow: 0 0 20px var(--accent-glow); }
        .hero-subtitle { font-size: 0.7rem; color: #666; letter-spacing: 4px; margin-top: 10px; font-family: 'Orbitron'; }

        /* --- Search & Filters --- */
        .search-container { max-width: 600px; margin: 0 auto 40px; padding: 0 20px; }
        .search-box input {
            width: 100%; padding: 15px 25px; background: #111; border: 1px solid #222;
            border-radius: 100px; color: #fff; outline: none; transition: 0.3s;
        }
        .filter-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .f-btn {
            background: #111; border: 1px solid #222; color: #666;
            padding: 6px 20px; border-radius: 100px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; font-family: 'Orbitron';
        }
        .f-btn.active { background: #ffc107; color: #000; border-color: #ffc107; }

        /* --- Member Grid --- */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; padding: 0 5% 100px; max-width: 1200px; margin: 0 auto;
        }
        .member-card {
            background: #111; border: 1px solid #222; border-radius: 15px;
            padding: 15px; display: flex; align-items: center; gap: 20px; transition: 0.3s;
        }
        .avatar-box { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; border: 2px solid #222; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .member-info h3 { font-size: 1.1rem; font-family: 'Orbitron'; margin-bottom: 5px; color: #eee; }
        .role-badge { background: #222; color: #aaa; padding: 2px 12px; border-radius: 5px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
        .fb-link { color: #0084ff; text-decoration: none; font-size: 0.8rem; }

        /* --- Admin UI (Modernized) --- */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .admin-window {
            background: #0a0a0a; width: 90%; max-width: 800px; max-height: 90vh;
            border: 1px solid #222; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column;
        }
        .admin-header { 
            padding: 20px; 
            border-bottom: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #000;
        }
        .admin-header-actions { display: flex; align-items: center; gap: 20px; }
        .home-link { color: #fff; text-decoration: none; font-size: 0.8rem; font-family: 'Orbitron'; display: flex; align-items: center; gap: 5px; opacity: 0.7; transition: 0.3s; }
        .home-link:hover { opacity: 1; }

        .admin-body { padding: 25px; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 12px; background: #000; border: 1px solid #222;
            color: #fff; border-radius: 8px; outline: none; transition: 0.3s;
        }
        .btn-save {
            width: 100%; padding: 15px; background: #fff; color: #000; border: none;
            border-radius: 8px; font-weight: 900; cursor: pointer; font-family: 'Orbitron';
        }
        .admin-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px;
        }
        .fa-trash:hover { color: #ff4444; }
        .fa-edit:hover { color: #ffc107; }

    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="member-counter-top">
            <i class="fa-solid fa-user-group"></i> <span id="countNumber">0</span>
        </div>
        <div class="logo-text">DEMOWATSUT</div>
        <div class="nav-btns">
            <a class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-users"></i> Members</a>
            <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> Admin</a>
        </div>
    </nav>

    <header class="hero-section">
        <img src="https://img5.pic.in.th/file/secure-sv1/Untitled-17361494911.png" alt="Logo" class="main-logo">
        <h1 class="hero-title">DEMOWATSUT</h1>
        <p class="hero-subtitle">STAND FOR WINTERFELL DEMO</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search members..." onkeyup="renderMembers()">
        </div>
        <div class="filter-group" id="filterArea"></div>
    </div>

    <div class="grid-container" id="memberList"></div>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 400px;">
            <div class="admin-body" style="text-align: center;">
                <h2 style="font-family:'Orbitron'; margin-bottom: 20px;">SYSTEM ACCESS</h2>
                <input type="password" id="adminPass" placeholder="ENTER PASSWORD" style="text-align: center; margin-bottom: 15px;">
                <button class="btn-save" onclick="handleLogin()">ACCESS</button>
                <p onclick="closeModals()" style="margin-top: 15px; color: #444; cursor: pointer; font-size: 0.8rem;">CLOSE</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-header">
                <h3 style="font-family:'Orbitron'; letter-spacing: 2px;">DATABASE MANAGEMENT</h3>
                <div class="admin-header-actions">
                    <a href="javascript:void(0)" class="home-link" onclick="closeModals()"><i class="fa-solid fa-house"></i> HOME</a>
                    <button onclick="closeModals()" style="background:none; border:none; color:#fff; cursor:pointer; font-size: 1.2rem;"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="admin-body">
                <div id="formSection">
                    <input type="hidden" id="editId">
                    <div class="form-grid">
                        <div class="input-group">
                            <input type="text" id="mName" placeholder="Display Name (เช่น Ahfei)">
                        </div>
                        <div class="input-group">
                            <select id="mRoleSelect"></select>
                        </div>
                        <div class="input-group">
                            <input type="text" id="mImg" placeholder="Image URL (Link รูปโปรไฟล์)">
                        </div>
                        <div class="input-group">
                            <input type="text" id="mFB" placeholder="Facebook Link">
                        </div>
                    </div>
                    <button class="btn-save" id="saveBtn" onclick="saveMember()">SAVE MEMBER</button>
                </div>

                <div class="manage-list">
                    <h4 style="font-family:'Orbitron'; font-size: 0.75rem; color:#666; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px;">MANAGE MEMBERS</h4>
                    <div id="adminMemberList"></div>
                </div>
                
                <div class="manage-list">
                    <h4 style="font-family:'Orbitron'; font-size: 0.75rem; color:#666; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px;">SYSTEM CATEGORIES</h4>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <input type="text" id="newCat" placeholder="Unit Name">
                        <button onclick="addCategory()" style="background:#222; color:#fff; border:none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-family:'Orbitron'; font-size:0.7rem;">ADD</button>
                    </div>
                    <div id="adminCatList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["DEMOWATSUT", "DEMO", "WINTERFELL DEMO", "DOKKADON"];

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') {
                isAdmin = true;
                closeModals();
                openAdmin();
            } else { alert("Incorrect Password"); }
        }

        // --- Category Management ---
        db.ref('categories').on('value', snap => {
            const data = snap.val();
            let filterHtml = `<button class="f-btn active" onclick="setFilter('all', this)">All</button>`;
            let selectHtml = '';
            let adminCatHtml = '';
            let catNames = [...defaultCats];

            if(data) {
                for(let id in data) { if(!catNames.includes(data[id].name)) catNames.push(data[id].name); }
            }

            catNames.forEach(name => {
                filterHtml += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                selectHtml += `<option value="${name}">${name}</option>`;
            });

            if(data) {
                for(let id in data) {
                    adminCatHtml += `<div class="role-badge" style="display:flex; align-items:center; gap:8px; padding:5px 12px;">${data[id].name} <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:0.6rem;" onclick="deleteCat('${id}')"></i></div>`;
                }
            }

            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleSelect').innerHTML = selectHtml;
            document.getElementById('adminCatList').innerHTML = adminCatHtml;
        });

        // --- Member Management ---
        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminListHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminListHtml += `
                    <div class="admin-item">
                        <div class="admin-item-info">
                            <strong>${m.name}</strong> <span style="font-size:0.7rem; color:#444; margin-left:10px;">${m.role}</span>
                        </div>
                        <div class="admin-actions">
                            <i class="fa-solid fa-edit" onclick="editMember('${id}')"></i>
                            <i class="fa-solid fa-trash" style="margin-left:15px;" onclick="deleteMember('${id}')"></i>
                        </div>
                    </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminListHtml;
            renderMembers();
        });

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('mName').value,
                role: document.getElementById('mRoleSelect').value,
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Please enter name");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
            alert("Success!");
        }

        function editMember(id) {
            const m = allMembers.find(item => item.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mRoleSelect').value = m.role;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
            document.getElementById('adminPanel').querySelector('.admin-body').scrollTop = 0;
        }

        async function deleteMember(id) { if(confirm("Delete this member?")) await db.ref('members/'+id).remove(); }
        async function deleteCat(id) { if(confirm("Delete this category?")) await db.ref('categories/'+id).remove(); }
        async function addCategory() {
            const name = document.getElementById('newCat').value.toUpperCase();
            if(name) await db.ref('categories').push({ name });
            document.getElementById('newCat').value = '';
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.getElementById('saveBtn').innerText = "SAVE MEMBER";
        }

        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => (currentFilter==='all' || m.role===currentFilter) && m.name.toLowerCase().includes(search));
            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map(m => `
                <div class="member-card">
                    <div class="avatar-box">
                        <img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div class="tag-row">
                            <span class="role-badge">${m.role}</span>
                            <a href="${m.facebook}" target="_blank" class="fb-link">Facebook</a>
                        </div>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายชื่อ - DEMOWATSUT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #000000;
            --card-bg: #0e0e0e;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .top-nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .member-counter-top {
            font-family: 'Orbitron';
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 6px 18px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .logo-text { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 4px; font-size: 1.2rem; }
        .nav-btns { display: flex; gap: 20px; }
        .nav-btn { color: #888; text-decoration: none; cursor: pointer; transition: var(--transition); font-size: 0.85rem; font-weight: 600; }
        .nav-btn:hover { color: #fff; transform: translateY(-2px); }

        /* --- Hero --- */
        .hero-section { text-align: center; padding: 50px 20px; }
        .main-logo { width: 90px; margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        .hero-title { font-family: 'Orbitron'; font-size: 2rem; letter-spacing: 10px; text-transform: uppercase; }
        .hero-subtitle { font-size: 0.7rem; color: #555; letter-spacing: 4px; margin-top: 5px; font-weight: 400; }

        /* --- Search --- */
        .search-container { max-width: 650px; margin: 0 auto 40px; padding: 0 20px; }
        .search-box input {
            width: 100%; padding: 14px 28px; background: #0a0a0a; border: 1px solid #1a1a1a;
            border-radius: 100px; color: #fff; outline: none; transition: var(--transition); font-family: 'Bai Jamjuree';
        }
        .search-box input:focus { border-color: #444; background: #111; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .filter-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 25px; }
        .f-btn {
            background: #0a0a0a; border: 1px solid #1a1a1a; color: #555;
            padding: 7px 16px; border-radius: 100px; cursor: pointer; font-size: 0.75rem; transition: var(--transition);
        }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }

        /* --- Member Card --- */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px; padding: 0 5% 100px; max-width: 1300px; margin: 0 auto;
        }

        .member-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px;
            padding: 18px; display: flex; align-items: center; gap: 18px; transition: var(--transition);
            animation: fadeInUp 0.5s ease forwards; opacity: 0;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .member-card:hover { transform: translateY(-5px); border-color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

        .avatar-box { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; border: 2px solid #1a1a1a; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .member-info h3 { font-size: 1.1rem; font-family: 'Orbitron'; margin-bottom: 6px; color: #eee; }
        
        /* One-Line Tag System */
        .tag-row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; overflow: hidden; }
        .role-badge { 
            background: #1a1a1a; color: #888; padding: 3px 9px; border-radius: 5px; 
            font-size: 0.65rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;
        }
        
        .plus-badge { 
            background: #fff; color: #000; cursor: pointer; font-size: 0.7rem; font-weight: 900; 
            width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; 
            border-radius: 5px; transition: 0.3s; flex-shrink: 0;
        }

        .hidden-roles { display: none; align-items: center; gap: 6px; }
        .hidden-roles.show { display: flex; animation: slideRight 0.3s ease; }
        @keyframes slideRight { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .fb-link { color: #0084ff; text-decoration: none; font-size: 0.9rem; margin-left: auto; transition: 0.3s; }

        /* --- Admin UI --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .admin-window { background: #080808; width: 90%; max-width: 700px; max-height: 85vh; border: 1px solid #222; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .admin-body { padding: 25px; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; outline: none; font-family: 'Bai Jamjuree'; }
        .btn-save { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-save:hover { background: #ccc; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="member-counter-top">
            <i class="fa-solid fa-user-group"></i> <span id="countNumber">0</span>
        </div>
        <div class="logo-text">DEMOWATSUT</div>
        <div class="nav-btns">
            <a class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-users"></i> สมาชิก</a>
            <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> ผู้ดูแล</a>
        </div>
    </nav>

    <header class="hero-section">
        <img src="https://img5.pic.in.th/file/secure-sv1/Untitled-17361494911.png" alt="Logo" class="main-logo">
        <h1 class="hero-title">DEMOWATSUT</h1>
        <p class="hero-subtitle">ฐานข้อมูลสมาชิกอย่างเป็นทางการ</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อสมาชิกที่นี่..." onkeyup="renderMembers()">
        </div>
        <div class="filter-group" id="filterArea"></div>
    </div>

    <div class="grid-container" id="memberList"></div>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 380px;">
            <div class="admin-body" style="text-align: center;">
                <h2 style="font-family:'Orbitron'; margin-bottom: 20px;">ยืนยันตัวตน</h2>
                <input type="password" id="adminPass" placeholder="กรอกรหัสผ่าน" style="text-align: center; margin-bottom: 15px;">
                <button class="btn-save" onclick="handleLogin()">เข้าใช้งาน</button>
                <p onclick="closeModals()" style="margin-top: 15px; color: #444; cursor: pointer; font-size: 0.8rem;">ยกเลิก</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-body">
                <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
                    <h3 style="font-family:'Orbitron';">ระบบจัดการหลังบ้าน</h3>
                    <button onclick="closeModals()" style="background:none; border:none; color:#fff; cursor:pointer; font-size: 1.2rem;"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div id="formSection" style="margin-bottom: 30px;">
                    <input type="hidden" id="editId">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
                        <input type="text" id="mName" placeholder="ชื่อที่แสดง">
                        <input type="text" id="mFB" placeholder="ลิงก์ Facebook">
                        <input type="text" id="mImg" placeholder="URL รูปภาพโปรไฟล์" style="grid-column: span 2;">
                        <div style="grid-column: span 2; background: #0e0e0e; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a;">
                            <span style="font-size:0.7rem; color:#555; display:block; margin-bottom:10px;">เลือกหัวข้อ (เลือกได้มากกว่า 1)</span>
                            <div id="mRoleCheckboxes" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px;"></div>
                        </div>
                    </div>
                    <button class="btn-save" id="saveBtn" onclick="saveMember()">บันทึกข้อมูล</button>
                </div>

                <div id="adminMemberList" style="border-top: 1px solid #1a1a1a; padding-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["DEMOWATSUT", "DEMO", "WINTERFELL DEMO", "DOKKADON"];

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') {
                isAdmin = true; closeModals(); openAdmin();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        function toggleBadges(btn, id) {
            const hiddenBox = document.getElementById('extra-'+id);
            if(hiddenBox.classList.contains('show')) {
                hiddenBox.classList.remove('show');
                btn.innerText = '+';
            } else {
                hiddenBox.classList.add('show');
                btn.innerText = '-';
            }
        }

        db.ref('categories').on('value', snap => {
            const data = snap.val();
            let filterHtml = `<button class="f-btn active" onclick="setFilter('all', this)">ทั้งหมด</button>`;
            let checkHtml = '';
            let catNames = [...defaultCats];
            if(data) { for(let id in data) { if(!catNames.includes(data[id].name)) catNames.push(data[id].name); } }

            catNames.forEach(name => {
                filterHtml += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                checkHtml += `<label style="display:flex; align-items:center; gap:5px; font-size:0.75rem;"><input type="checkbox" name="roles" value="${name}"> ${name}</label>`;
            });
            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleCheckboxes').innerHTML = checkHtml;
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `<div style="display:flex; justify-content:space-between; background:#111; padding:10px 15px; border-radius:8px; margin-bottom:8px; align-items:center;">
                    <span style="font-size:0.85rem;">${m.name}</span>
                    <div><i class="fa-solid fa-edit" onclick="editMember('${id}')" style="cursor:pointer; color:#888;"></i> <i class="fa-solid fa-trash" onclick="deleteMember('${id}')" style="margin-left:15px; cursor:pointer; color:#ff4444;"></i></div>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            renderMembers();
        });

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            const data = {
                name: document.getElementById('mName').value,
                role: roles,
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name || roles.length === 0) return alert("กรุณากรอกชื่อและเลือกหัวข้อ");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm(); alert("ทำรายการสำเร็จ");
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
            document.getElementById('saveBtn').innerText = "บันทึกข้อมูล";
        }

        function editMember(id) {
            const m = allMembers.find(i => i.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = m.role.includes(cb.value));
            document.getElementById('saveBtn').innerText = "แก้ไขข้อมูล";
        }

        async function deleteMember(id) { if(confirm("ต้องการลบข้อมูลนี้ใช่หรือไม่?")) await db.ref('members/'+id).remove(); }

        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return m.name.toLowerCase().includes(search) && (currentFilter==='all' || roles.includes(currentFilter));
            });

            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map((m, idx) => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                const firstRole = roles[0];
                const otherRoles = roles.slice(1);
                
                return `
                <div class="member-card" style="animation-delay: ${idx * 0.05}s">
                    <div class="avatar-box">
                        <img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <div class="member-info" style="flex:1; overflow:hidden;">
                        <h3>${m.name}</h3>
                        <div class="tag-row">
                            <span class="role-badge" style="color:#fff; border-color:#333;">${firstRole}</span>
                            ${otherRoles.length > 0 ? `
                                <div class="plus-badge" onclick="toggleBadges(this, '${m.id}')">+</div>
                                <div class="hidden-roles" id="extra-${m.id}">
                                    ${otherRoles.map(r => `<span class="role-badge">${r}</span>`).join('')}
                                </div>
                            ` : ''}
                            <a href="${m.facebook}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>
                        </div>
                    </div>
                </div>`
            }).join('');
        }
    </script>
</body>
</html>

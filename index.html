<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(20, 20, 22, 0.7);
            --admin-card: #1c1e22;
            --input-bg: #111214;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --danger: #ff4757;
            --success: #2ed573;
        }

        /* Smooth Entry Animation */
        @keyframes globalFadeIn {
            0% { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background-color: var(--bg); background-size: cover; background-position: center; 
            background-attachment: fixed; color: #fff; font-family: 'Inter', sans-serif; 
            overflow-x: hidden; line-height: 1.6; transition: background 0.8s ease;
            opacity: 0; /* เริ่มต้นที่ 0 เพื่อรอการ Fade-in */
            animation: globalFadeIn 1.2s ease forwards;
        }

        #weather-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        /* Navbar & Nav Elements */
        .top-nav { 
            position: fixed; top: 0; width: 100%; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(10,10,10,0.6); 
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); 
        }

        .config-btn { 
            background: var(--accent); color: #000; border: none; padding: 10px 20px; 
            border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; 
            transition: var(--transition); font-size: 11px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .config-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 193, 7, 0.3); }

        /* Hero Section */
        .hero { padding: 160px 20px 60px; text-align: center; }
        #siteLogo { 
            max-width: 140px; margin-bottom: 25px; 
            filter: drop-shadow(0 0 20px var(--accent));
            transition: var(--transition);
        }
        .hero h1 { 
            font-family: 'Orbitron'; font-size: clamp(32px, 6vw, 56px); 
            letter-spacing: 12px; color: var(--accent); text-transform: uppercase; 
            margin-bottom: 8px; text-shadow: 0 0 30px rgba(255, 193, 7, 0.2);
        }

        /* Member Grid & Cards */
        .member-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; padding: 0 8% 100px; max-width: 1440px; margin: 0 auto; 
            z-index: 100; position: relative; 
        }
        .member-card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 20px; padding: 24px; display: flex; align-items: center; 
            gap: 20px; transition: var(--transition); backdrop-filter: blur(12px); 
        }
        .member-card:hover { 
            border-color: var(--accent); transform: scale(1.03); 
            background: rgba(30, 30, 35, 0.9); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .avatar { width: 75px; height: 75px; border-radius: 15px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .rank-tag { 
            font-family: 'Orbitron'; font-size: 9px; font-weight: 800; 
            padding: 5px 14px; border-radius: 6px; color: #000; 
            letter-spacing: 1px; margin-top: 8px; display: inline-block; 
        }

        /* Admin & UI Components */
        .admin-panel { display: none; position: fixed; inset: 0; background: rgba(12, 13, 15, 0.98); z-index: 9999; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(20px); }
        .admin-card { background: var(--admin-card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        
        input, select { 
            width: 100%; padding: 16px; background: var(--input-bg); 
            border: 1px solid #2d2f34; color: #fff; border-radius: 12px; 
            margin-bottom: 20px; font-size: 14px; transition: var(--transition);
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(255, 193, 7, 0.1); outline: none; }
        
        #notification-container { position: fixed; top: 30px; right: 30px; z-index: 10000; }
        .notify { 
            background: var(--accent); color: #000; border-radius: 12px; 
            padding: 16px 28px; font-weight: 700; font-size: 13px; 
            display: flex; align-items: center; gap: 12px; margin-top: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: globalFadeIn 0.4s ease;
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(24px); }

        @media (max-width: 768px) { .member-grid { padding: 0 20px 100px; } .top-nav { padding: 15px 20px; } }
    </style>
</head>
<body>

    <canvas id="weather-canvas"></canvas>
    <div id="notification-container"></div>
    <div id="yt-player-container" style="display:none; visibility: hidden;"><div id="player"></div></div>

    <div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(15px);">
        <div class="admin-card" style="width:90%; max-width:400px; animation: globalFadeIn 0.5s ease;">
            <h2 style="font-family:'Orbitron'; text-align:center; color:var(--accent); margin-bottom:30px; letter-spacing: 2px;">AUTHENTICATION</h2>
            <label style="font-size: 10px; font-family: 'Orbitron'; color: var(--accent);">IDENTITY</label>
            <input type="text" id="loginUser" placeholder="Enter Username">
            <label style="font-size: 10px; font-family: 'Orbitron'; color: var(--accent);">SECURITY KEY</label>
            <input type="password" id="loginPass" placeholder="••••••••">
            <button class="config-btn" style="width:100%; padding: 15px;" onclick="attemptLogin()">ACCESS SYSTEM</button>
            <button style="width:100%; background:none; border:none; color:#777; margin-top:15px; cursor:pointer; font-size: 12px;" onclick="closeModal('loginModal')">BACK TO TERMINAL</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-family:'Orbitron'; font-size:11px; letter-spacing:2px; font-weight: 700;">
            <i class="fa-solid fa-signal" style="color:var(--accent); margin-right: 8px;"></i> STATUS: <span id="countNum" style="color: var(--accent)">0</span> ONLINE
        </div>
        <button class="config-btn" onclick="openModal('loginModal')"><i class="fa-solid fa-shield-halved"></i> COMMAND</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">...</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:11px; opacity:0.5; letter-spacing:8px; margin-top: 10px;">OPERATIONAL DIRECTORY</p>
    </header>

    <div style="max-width:700px; margin:0 auto 60px; padding:0 20px;">
        <div style="position: relative;">
            <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 20px; top: 18px; opacity: 0.4;"></i>
            <input type="text" id="memberSearch" placeholder="SEARCH PERSONNEL..." oninput="filterMembers()" style="border-radius:50px; padding-left:55px; background:rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05);">
        </div>
        <div id="categoryTabs" style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap;"></div>
    </div>

    <div id="memberList" class="member-grid"></div>

    <div id="adminPanel" class="admin-panel">
        <div style="max-width: 1200px; margin: 0 auto;">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h2 style="font-family:'Orbitron'; color:var(--accent); letter-spacing: 2px;">CENTRAL COMMAND</h2>
                <button class="config-btn" style="background:#ff4757; color:#fff;" onclick="closeAdminPanel()">EXIT SESSION</button>
            </header>
            
            <div style="color: #666; text-align: center; padding: 100px;">
                <p>Admin Interface Active. Use the panels to sync database.</p>
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player, currentRoles = {}, currentMembers = {}, activeTab = 'all', weatherType = 'none';

        // --- Auth & Navigation ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                closeModal('loginModal'); 
                document.getElementById('adminPanel').style.display = 'block';
                document.body.style.overflow = 'hidden';
            } else { showNotify("ACCESS DENIED"); }
        }
        function closeAdminPanel() { document.getElementById('adminPanel').style.display = 'none'; document.body.style.overflow = 'auto'; }

        // --- Real-time Config Sync ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            document.title = d.name || 'GHETTOTROPHY';
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('favicon').href = d.favicon || '';
            document.getElementById('siteLogo').src = d.logo || '';
            
            if(d.bgUrl) document.body.style.backgroundImage = `url('${d.bgUrl}')`;
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
            
            weatherType = d.weather || 'none'; 
            initWeather();
        });

        // --- Database Logic ---
        db.ref('roles').on('value', snap => {
            currentRoles = snap.val() || {};
            renderTabs(); filterMembers();
        });

        db.ref('members').on('value', snap => {
            currentMembers = snap.val() || {};
            document.getElementById('countNum').innerText = Object.keys(currentMembers).length;
            filterMembers();
        });

        // --- YouTube & Autoplay (Silent) ---
        function onYouTubeIframeAPIReady() {
            db.ref('music').on('value', snap => {
                const m = snap.val();
                if(!m || !m.id) return;
                if(!player) {
                    player = new YT.Player('player', {
                        height: '0', width: '0', videoId: m.id,
                        playerVars: { 'autoplay': 1, 'controls': 0, 'start': m.start || 0 },
                        events: { 'onReady': e => { e.target.setVolume(50); e.target.playVideo(); } }
                    });
                } else {
                    player.loadVideoById({ videoId: m.id, startSeconds: m.start || 0 });
                }
            });
        }

        // --- UI Utils ---
        function filterMembers() {
            const term = document.getElementById('memberSearch').value.toLowerCase();
            const grid = document.getElementById('memberList');
            let html = '';
            Object.keys(currentMembers).forEach(id => {
                const m = currentMembers[id];
                const role = currentRoles[m.roleId] || { name: 'MEMBER', color: '#888' };
                if(m.name.toLowerCase().includes(term) && (activeTab === 'all' || m.roleId === activeTab)) {
                    html += `<div class="member-card">
                        <img src="${m.img || 'https://i.imgur.com/6VBx3io.png'}" class="avatar">
                        <div><div style="font-weight:600; font-size: 15px;">${m.name}</div><span class="rank-tag" style="background:${role.color}">${role.name}</span></div>
                        <a href="${m.fb}" target="_blank" style="margin-left:auto; font-size:24px; color:#1877f2; transition: 0.3s;"><i class="fa-brands fa-facebook"></i></a>
                    </div>`;
                }
            });
            grid.innerHTML = html || '<p style="grid-column:1/-1; text-align:center; opacity:0.3; padding:100px; font-family: Orbitron;">NO PERSONNEL FOUND</p>';
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            let html = `<button class="config-btn" style="background:${activeTab === 'all' ? 'var(--accent)' : 'rgba(255,255,255,0.05)'}; color:${activeTab === 'all' ? '#000' : '#888'}" onclick="setActiveTab('all')">ALL</button>`;
            Object.keys(currentRoles).forEach(id => {
                const active = activeTab === id;
                html += `<button class="config-btn" style="background:${active ? 'var(--accent)' : 'rgba(255,255,255,0.05)'}; color:${active ? '#000' : '#888'}" onclick="setActiveTab('${id}')">${currentRoles[id].name}</button>`;
            });
            container.innerHTML = html;
        }

        function setActiveTab(id) { activeTab = id; renderTabs(); filterMembers(); }

        function showNotify(msg) {
            const t = document.createElement('div'); t.className = 'notify';
            t.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${msg}`;
            document.getElementById('notification-container').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        // --- Weather Engine (Optimized) ---
        const canvas = document.getElementById('weather-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function initWeather() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; if(weatherType === 'none') return;
            let count = weatherType === 'rain' ? 100 : 60;
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    v: weatherType === 'rain' ? (Math.random() * 4 + 4) : (Math.random() * 0.8 + 0.4),
                    size: weatherType === 'rain' ? 1 : (Math.random() * 2 + 1),
                    opacity: Math.random() * 0.4 + 0.1, wind: Math.random() * 0.4 - 0.2
                });
            }
            drawWeather();
        }

        function drawWeather() {
            if(weatherType === 'none') { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                if(weatherType === 'rain') { ctx.rect(p.x, p.y, p.size, p.size * 12); }
                else { ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); }
                ctx.fill();
                p.y += p.v; p.x += p.wind;
                if(p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
            });
            requestAnimationFrame(drawWeather);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>

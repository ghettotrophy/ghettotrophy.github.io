<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            --glow-color: rgba(255, 193, 7, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        html { scroll-behavior: smooth; }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(15px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--glow-color); }
            50% { text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color); }
        }

        /* --- Header --- */
        .top-nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(10,10,10,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .db-badge {
            font-family: 'Orbitron';
            font-size: 10px;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .config-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 11px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: var(--transition);
        }

        .config-btn:hover { background: #fff; color: #000; transform: translateY(-2px); }

        /* --- Hero & Glow Text --- */
        .hero {
            padding: 160px 20px 60px;
            text-align: center;
            animation: reveal 1.2s ease;
        }

        .hero h1 { 
            font-family: 'Orbitron'; 
            font-size: clamp(40px, 8vw, 70px);
            letter-spacing: 15px; 
            margin-bottom: 10px;
            font-weight: 700;
            transition: var(--transition);
        }

        .hero h1.glow-active {
            animation: textGlow 2s infinite ease-in-out;
            color: #fff;
        }

        .hero p { opacity: 0.5; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; }

        /* --- Search & Member Grid --- */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 8% 100px;
            max-width: 1600px;
            margin: 0 auto;
            transition: var(--transition);
        }

        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            animation: reveal 0.8s ease backwards;
        }

        .member-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            background: #1a1a1a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; }

        /* --- Custom Notification UI --- */
        .notif-overlay {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #fff; color: #000;
            padding: 15px 30px; border-radius: 50px;
            font-family: 'Orbitron'; font-size: 13px;
            z-index: 9999; font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition);
            opacity: 0;
        }
        .notif-overlay.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .notif-overlay.error { background: #ff4b4b; color: #fff; }

        /* --- Admin Modal --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; transition: var(--transition);
        }
        .modal.active { display: flex; opacity: 1; }

        .login-box {
            background: #111; padding: 50px; border-radius: 32px;
            width: 90%; max-width: 420px;
            border: 1px solid #222; text-align: center;
        }

        .login-box input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            padding: 16px; border-radius: 15px; color: #fff;
            margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        .login-box input:focus { border-color: var(--accent); }

        .login-btn {
            width: 100%; background: var(--accent); border: none;
            padding: 16px; border-radius: 15px; font-weight: 800;
            cursor: pointer; font-family: 'Orbitron'; margin-top: 10px;
        }
        
        /* Category Buttons Smooth */
        .cat-btn {
            background: rgba(255,255,255,0.03); border: 1px solid #222;
            color: #555; padding: 10px 25px; border-radius: 15px;
            font-family: 'Orbitron'; font-size: 12px; cursor: pointer;
            transition: var(--transition);
        }
        .cat-btn.active { background: #fff; color: #000; border-color: #fff; }

    </style>
</head>
<body>

    <div id="customNotif" class="notif-overlay">MESSAGE HERE</div>

    <nav class="top-nav">
        <div class="db-badge">MEMBERS: <span id="countNum">0</span></div>
        <button class="config-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> ACCESS ADMIN</button>
    </nav>

    <header class="hero">
        <h1 id="siteNameDisplay">SITE NAME</h1>
        <p id="siteDescDisplay">LOADING SYSTEM...</p>
    </header>

    <section style="display: flex; flex-direction: column; align-items: center; gap: 30px; margin-bottom: 50px;">
        <input type="text" id="searchInput" placeholder="SEARCH FOR MEMBER..." onkeyup="renderMembers()" 
               style="width: 350px; background: #111; border: 1px solid #222; padding: 15px 25px; border-radius: 50px; color: #fff; text-align: center; outline: none;">
        
        <div class="category-grid" id="categoryGrid" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="cat-btn active" onclick="filterCat('ALL')">ALL</button>
        </div>
    </section>

    <div id="memberList" class="member-grid"></div>

    <div id="loginModal" class="modal">
        <div class="login-box">
            <h2 style="font-family:'Orbitron'; margin-bottom: 30px;">AUTHORIZATION</h2>
            <input type="text" id="adminUser" placeholder="USERNAME">
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button class="login-btn" onclick="handleLogin()">LOGIN SYSTEM</button>
            <p onclick="closeModals()" style="margin-top:25px; font-size:11px; opacity:0.3; cursor:pointer; letter-spacing: 2px;">CLOSE WINDOW</p>
        </div>
    </div>

    <script>
        // --- Firebase & State ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [], siteConfig = {}, currentCat = 'ALL';

        // --- Custom UI Logic ---
        function showNotif(msg, isError = false) {
            const n = document.getElementById('customNotif');
            n.innerText = msg;
            n.className = `notif-overlay ${isError ? 'error' : ''} show`;
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        function openAdmin() { document.getElementById('loginModal').classList.add('active'); }
        function closeModals() { document.getElementById('loginModal').classList.remove('active'); }

        function handleLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'ghett9871') {
                showNotif("ACCESS GRANTED. REDIRECTING...");
                setTimeout(() => window.location.href = "admin.html", 1000);
            } else {
                showNotif("INVALID PASSWORD", true);
            }
        }

        // --- Data Listener ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            const siteTitle = document.getElementById('siteNameDisplay');
            
            siteTitle.innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.desc || '';
            
            // แสง Glow & สี
            if(d.themeColor) {
                document.documentElement.style.setProperty('--accent', d.themeColor);
                document.documentElement.style.setProperty('--glow-color', d.themeColor + '80'); // เพิ่ม Alpha 50%
            }
            
            // ติ๊กเปิด-ปิดแสง (ดึงค่าจาก d.glowEnable ที่ตั้งใน Admin)
            if(d.glowEnable === true || d.glowEnable === undefined) {
                siteTitle.classList.add('glow-active');
            } else {
                siteTitle.classList.remove('glow-active');
            }

            // Categories
            const cats = d.categories ? d.categories.split(',') : [];
            let catHtml = `<button class="cat-btn ${currentCat==='ALL'?'active':''}" onclick="filterCat('ALL')">ALL</button>`;
            cats.forEach(c => {
                const name = c.trim().toUpperCase();
                catHtml += `<button class="cat-btn ${currentCat===name?'active':''}" onclick="filterCat('${name}')">${name}</button>`;
            });
            document.getElementById('categoryGrid').innerHTML = catHtml;
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            for(let id in data) allMembers.push({...data[id], id});
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
        });

        function filterCat(cat) {
            currentCat = cat;
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('memberList');
            
            const filtered = allMembers.filter(m => {
                const matchSearch = m.name.toLowerCase().includes(search);
                const matchCat = currentCat === 'ALL' || (m.role && m.role.toUpperCase() === currentCat);
                return matchSearch && matchCat;
            });

            // Smooth transition by fading
            list.style.opacity = '0';
            setTimeout(() => {
                list.innerHTML = filtered.map((m, i) => `
                    <div class="member-card" style="animation-delay: ${i * 0.03}s">
                        <img src="${m.image || 'https://via.placeholder.com/150'}" class="avatar">
                        <div class="m-info">
                            <h3 style="font-family:'Orbitron'; font-size:16px;">${m.name}</h3>
                            <p style="font-size:10px; opacity:0.4; letter-spacing:1px; margin-top:4px;">${m.role || 'MEMBER'}</p>
                        </div>
                    </div>
                `).join('');
                list.style.opacity = '1';
            }, 200);
        }
    </script>
</body>
</html>

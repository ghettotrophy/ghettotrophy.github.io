<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(20, 20, 22, 0.95);
            --admin-card: #1c1e22;
            --input-bg: #111214;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #ff4757;
            --success: #2ed573;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background-color: var(--bg); background-size: cover; background-position: center; 
            background-attachment: fixed; color: #fff; font-family: 'Inter', sans-serif; 
            overflow-x: hidden; line-height: 1.6; transition: background 0.5s ease;
        }

        #weather-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .top-nav { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .config-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .config-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 193, 7, 0.4); }

        .hero { padding: 140px 20px 60px; text-align: center; animation: slideIn 0.8s ease; }
        #siteLogo { max-width: 140px; margin-bottom: 25px; filter: drop-shadow(0 0 25px var(--accent)); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(28px, 6vw, 52px); letter-spacing: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1440px; margin: 0 auto; z-index: 100; position: relative; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 18px; transition: var(--transition); backdrop-filter: blur(10px); }
        .member-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(25, 25, 28, 0.98); }
        .avatar { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.05); }
        .rank-tag { font-family: 'Orbitron'; font-size: 9px; font-weight: 800; padding: 4px 12px; border-radius: 5px; color: #000; letter-spacing: 1px; margin-top: 6px; display: inline-block; }

        .admin-panel { display: none; position: fixed; inset: 0; background: #0c0d0f; z-index: 9999; overflow-y: auto; padding: 40px 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .admin-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
        .admin-card { background: var(--admin-card); padding: 28px; border-radius: 20px; border: 1px solid var(--border); }
        
        .col-4 { grid-column: span 4; }
        .col-8 { grid-column: span 8; }
        .col-12 { grid-column: span 12; }

        label { display: block; font-family: 'Orbitron'; font-size: 10px; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #2d2f34; color: #fff; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .btn-save { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-weight: 700; transition: var(--transition); background: var(--accent); color: #000; }
        .admin-item-row { background: #111214; padding: 15px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .delete-btn { color: var(--danger); cursor: pointer; padding: 8px; }

        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 10000; }
        .notify { background: var(--accent); color: #000; border-radius: 8px; padding: 14px 24px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px; margin-top: 10px; animation: slideIn 0.3s ease; }

        @media (max-width: 992px) { .col-4, .col-8 { grid-column: span 12; } }
    </style>
</head>
<body>

    <canvas id="weather-canvas"></canvas>
    <div id="notification-container"></div>
    <div id="yt-player-container" style="display:none;"><div id="player"></div></div>

    <div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
        <div class="admin-card" style="width:100%; max-width:400px;">
            <h2 style="font-family:'Orbitron'; text-align:center; color:var(--accent); margin-bottom:30px;">AUTHENTICATION</h2>
            <label>IDENTITY</label><input type="text" id="loginUser">
            <label>SECURITY KEY</label><input type="password" id="loginPass">
            <button class="btn-save" onclick="attemptLogin()">ACCESS SYSTEM</button>
            <button style="width:100%; background:none; border:none; color:#555; margin-top:15px; cursor:pointer;" onclick="closeModal('loginModal')">CANCEL</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-family:'Orbitron'; font-size:11px; letter-spacing:2px;">
            <i class="fa-solid fa-users" style="color:var(--accent)"></i> ACTIVE: <span id="countNum">0</span>
        </div>
        <button class="config-btn" onclick="openModal('loginModal')"><i class="fa-solid fa-lock"></i> SYSTEM</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">LOADING...</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:11px; opacity:0.6; letter-spacing:6px;">PERSONNEL DIRECTORY</p>
    </header>

    <div style="max-width:700px; margin:0 auto 60px; padding:0 20px;">
        <input type="text" id="memberSearch" placeholder="FIND COLLEAGUE..." oninput="filterMembers()" style="border-radius:50px; padding-left:30px; background:rgba(255,255,255,0.03);">
        <div id="categoryTabs" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
    </div>

    <div id="memberList" class="member-grid"></div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-container">
            <header class="admin-header">
                <div>
                    <h2 style="font-family:'Orbitron'; color:var(--accent); font-size:24px;">CENTRAL COMMAND</h2>
                    <p style="font-size:12px; color:#555;">Real-time Database & Site Management</p>
                </div>
                <button class="config-btn" style="background:var(--danger); color:#fff;" onclick="closeAdminPanel()">TERMINATE SESSION</button>
            </header>

            <div class="admin-grid">
                <div class="admin-card col-4">
                    <div style="margin-bottom:20px; font-family:'Orbitron'; font-size:14px; color:var(--accent);"><i class="fa-solid fa-sliders"></i> IDENTITY & THEME</div>
                    <label>SITE NAME (TITLE)</label><input type="text" id="configSiteName">
                    <label>FAVICON URL</label><input type="text" id="configFavicon">
                    <label>THEME ACCENT</label><input type="color" id="configThemeColor" style="height:50px; cursor:pointer;">
                    <label>LOGO URL</label><input type="text" id="configLogoUrl">
                    <label>WALLPAPER URL</label><input type="text" id="configBgUrl">
                    <label>ATMOSPHERE</label>
                    <select id="configWeather">
                        <option value="none">CLEAR</option>
                        <option value="snow">SNOWFLAKES</option>
                        <option value="rain">RAIN SHOWER</option>
                    </select>
                    <button class="btn-save" onclick="saveConfig()">SYNC CHANGES</button>
                </div>

                <div class="col-8" style="display:flex; flex-direction:column; gap:24px;">
                    <div class="admin-card">
                        <div style="margin-bottom:20px; font-family:'Orbitron'; font-size:14px; color:var(--accent);"><i class="fa-solid fa-tags"></i> ROLES</div>
                        <div style="display:flex; gap:15px;">
                            <input type="text" id="newRoleName" placeholder="ROLE NAME" style="margin-bottom:0;">
                            <input type="color" id="newRoleColor" value="#ffc107" style="width:80px; margin-bottom:0;">
                            <button class="config-btn" onclick="addRole()">ADD</button>
                        </div>
                        <div id="roleListContainer" style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
                    </div>

                    <div class="admin-card">
                        <div style="margin-bottom:20px; font-family:'Orbitron'; font-size:14px; color:var(--accent);"><i class="fa-solid fa-music"></i> AUDIO</div>
                        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:15px;">
                            <input type="text" id="musicVidId" placeholder="YOUTUBE ID" style="margin-bottom:0;">
                            <input type="number" id="musicStart" placeholder="SEC" style="margin-bottom:0;">
                            <button class="btn-save" onclick="saveMusic()">UPDATE</button>
                        </div>
                    </div>
                </div>

                <div class="admin-card col-12">
                    <div style="margin-bottom:20px; font-family:'Orbitron'; font-size:14px; color:var(--accent);"><i class="fa-solid fa-user-plus"></i> PERSONNEL</div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                        <div><label>FULL NAME</label><input type="text" id="memName"></div>
                        <div><label>AVATAR URL</label><input type="text" id="memImg"></div>
                        <div><label>SOCIAL LINK</label><input type="text" id="memFb"></div>
                        <div><label>ASSIGN ROLE</label><select id="memRole"></select></div>
                    </div>
                    <input type="hidden" id="editMemId">
                    <div style="display:flex; gap:10px;">
                        <button id="memBtn" class="btn-save" style="flex:3;" onclick="saveMember()">DEPLOY PERSONNEL</button>
                        <button class="btn-save" style="flex:1; background:#333; color:#fff;" onclick="clearMemForm()">RESET</button>
                    </div>
                    <div id="adminMemberList" style="margin-top:30px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player, currentRoles = {}, currentMembers = {}, activeTab = 'all', weatherType = 'none';

        // --- Auth & Modals ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                closeModal('loginModal'); 
                document.getElementById('adminPanel').style.display = 'block';
                document.body.style.overflow = 'hidden';
            } else showNotify("UNAUTHORIZED ACCESS");
        }
        function closeAdminPanel() { document.getElementById('adminPanel').style.display = 'none'; document.body.style.overflow = 'auto'; }

        // --- Config Sync (Including Title) ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            const siteTitle = d.name || 'GHETTOTROPHY';
            
            // Apply to UI
            document.title = siteTitle;
            document.getElementById('siteNameDisplay').innerText = siteTitle;
            document.getElementById('favicon').href = d.favicon || '';
            document.getElementById('siteLogo').src = d.logo || '';
            
            if(d.bgUrl) document.body.style.backgroundImage = `url('${d.bgUrl}')`;
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
            
            // Sync Admin Inputs
            document.getElementById('configSiteName').value = d.name || '';
            document.getElementById('configFavicon').value = d.favicon || '';
            document.getElementById('configThemeColor').value = d.themeColor || '#ffc107';
            document.getElementById('configLogoUrl').value = d.logo || '';
            document.getElementById('configBgUrl').value = d.bgUrl || '';
            document.getElementById('configWeather').value = d.weather || 'none';

            weatherType = d.weather || 'none'; initWeather();
        });

        function saveConfig() {
            const data = {
                name: document.getElementById('configSiteName').value,
                favicon: document.getElementById('configFavicon').value,
                themeColor: document.getElementById('configThemeColor').value,
                logo: document.getElementById('configLogoUrl').value,
                bgUrl: document.getElementById('configBgUrl').value,
                weather: document.getElementById('configWeather').value
            };
            db.ref('config').set(data).then(() => showNotify("IDENTITY SYNCHRONIZED"));
        }

        // --- Weather Engine ---
        const canvas = document.getElementById('weather-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function initWeather() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; if(weatherType === 'none') return;
            for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*1.5+0.5, size: Math.random()*2+1, opacity: Math.random() });
            drawWeather();
        }
        function drawWeather() {
            if(weatherType === 'none') { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#fff';
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.y += p.v; if(p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(drawWeather);
        }

        // --- Database Logic (Roles, Members, Music) ---
        db.ref('roles').on('value', snap => {
            currentRoles = snap.val() || {};
            let opt = '<option value="">SELECT ROLE</option>', list = '';
            Object.keys(currentRoles).forEach(id => {
                opt += `<option value="${id}">${currentRoles[id].name}</option>`;
                list += `<div class="admin-item-row"><span style="color:${currentRoles[id].color}">${currentRoles[id].name}</span><i class="fa-solid fa-trash-can delete-btn" onclick="db.ref('roles').child('${id}').remove()"></i></div>`;
            });
            document.getElementById('memRole').innerHTML = opt;
            document.getElementById('roleListContainer').innerHTML = list;
            renderTabs(); filterMembers();
        });

        db.ref('members').on('value', snap => {
            currentMembers = snap.val() || {};
            document.getElementById('countNum').innerText = Object.keys(currentMembers).length;
            let adminList = '';
            Object.keys(currentMembers).forEach(id => {
                const m = currentMembers[id];
                adminList += `<div class="admin-item-row"><span>${m.name}</span><div><i class="fa-solid fa-pen-to-square" style="cursor:pointer; margin-right:12px; color:var(--accent)" onclick="editMember('${id}')"></i><i class="fa-solid fa-trash-can delete-btn" onclick="db.ref('members').child('${id}').remove()"></i></div></div>`;
            });
            document.getElementById('adminMemberList').innerHTML = adminList;
            filterMembers();
        });

        function saveMember() {
            const id = document.getElementById('editMemId').value;
            const data = { name: document.getElementById('memName').value, img: document.getElementById('memImg').value, fb: document.getElementById('memFb').value, roleId: document.getElementById('memRole').value };
            if(!data.name || !data.roleId) return showNotify("DATA INCOMPLETE");
            const ref = id ? db.ref('members').child(id) : db.ref('members').push();
            ref.set(data).then(() => { showNotify("REGISTRY UPDATED"); clearMemForm(); });
        }

        function editMember(id) {
            const m = currentMembers[id];
            document.getElementById('editMemId').value = id;
            document.getElementById('memName').value = m.name;
            document.getElementById('memImg').value = m.img;
            document.getElementById('memFb').value = m.fb;
            document.getElementById('memRole').value = m.roleId;
            document.getElementById('memBtn').innerText = "UPDATE PERSONNEL";
        }

        function clearMemForm() {
            document.getElementById('editMemId').value = '';
            document.getElementById('memName').value = '';
            document.getElementById('memImg').value = '';
            document.getElementById('memFb').value = '';
            document.getElementById('memBtn').innerText = "DEPLOY PERSONNEL";
        }

        function addRole() {
            const name = document.getElementById('newRoleName').value.toUpperCase();
            const color = document.getElementById('newRoleColor').value;
            if(name) db.ref('roles').push({ name, color }).then(() => { document.getElementById('newRoleName').value = ''; showNotify("ROLE ARCHIVED"); });
        }

        function saveMusic() {
            const data = { id: document.getElementById('musicVidId').value, start: document.getElementById('musicStart').value };
            db.ref('music').set(data).then(() => showNotify("AUDIO UPDATED"));
        }

        // --- Music Player ---
        function onYouTubeIframeAPIReady() {
            db.ref('music').on('value', snap => {
                const m = snap.val();
                if(!m || !m.id) return;
                if(!player) {
                    player = new YT.Player('player', {
                        height: '0', width: '0', videoId: m.id,
                        playerVars: { 'autoplay': 1, 'controls': 0, 'start': m.start || 0 },
                        events: { 'onReady': e => e.target.setVolume(50) }
                    });
                } else {
                    player.loadVideoById({ videoId: m.id, startSeconds: m.start || 0 });
                }
            });
        }

        // --- UI Utils ---
        function filterMembers() {
            const term = document.getElementById('memberSearch').value.toLowerCase();
            const grid = document.getElementById('memberList');
            let html = '';
            Object.keys(currentMembers).forEach(id => {
                const m = currentMembers[id];
                const role = currentRoles[m.roleId] || { name: 'MEMBER', color: '#888' };
                if(m.name.toLowerCase().includes(term) && (activeTab === 'all' || m.roleId === activeTab)) {
                    html += `<div class="member-card">
                        <img src="${m.img || 'https://i.imgur.com/6VBx3io.png'}" class="avatar">
                        <div><div style="font-weight:600;">${m.name}</div><span class="rank-tag" style="background:${role.color}">${role.name}</span></div>
                        <a href="${m.fb}" target="_blank" style="margin-left:auto; font-size:22px; color:#1877f2;"><i class="fa-brands fa-facebook"></i></a>
                    </div>`;
                }
            });
            grid.innerHTML = html || '<p style="grid-column:1/-1; text-align:center; opacity:0.3; padding:50px;">NO DATA FOUND</p>';
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            let html = `<button class="config-btn" style="background:${activeTab === 'all' ? 'var(--accent)' : '#222'}; color:${activeTab === 'all' ? '#000' : '#888'}" onclick="setActiveTab('all')">ALL</button>`;
            Object.keys(currentRoles).forEach(id => {
                const active = activeTab === id;
                html += `<button class="config-btn" style="background:${active ? 'var(--accent)' : '#222'}; color:${active ? '#000' : '#888'}" onclick="setActiveTab('${id}')">${currentRoles[id].name}</button>`;
            });
            container.innerHTML = html;
        }

        function setActiveTab(id) { activeTab = id; renderTabs(); filterMembers(); }

        function showNotify(msg) {
            const t = document.createElement('div'); t.className = 'notify';
            t.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${msg}`;
            document.getElementById('notification-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>

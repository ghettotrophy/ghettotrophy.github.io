<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #000000;
            --card-bg: #0e0e0e;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
        }

        /* --- Layout หลัก --- */
        .top-nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .hero-section { text-align: center; padding: 40px 20px; }
        .hero-title { font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 10px; color: var(--accent); text-transform: uppercase; }

        /* --- จุดสำคัญ: การตั้งค่า 3 คนต่อบรรทัด --- */
        .grid-container {
            display: grid;
            /* แบ่งเป็น 3 คอลัมน์เท่าๆ กัน */
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
            padding: 20px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ปรับสไตล์ให้ดูสวยงามเมื่ออยู่รวมกัน 3 คน */
        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .member-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar-box {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #1a1a1a;
            flex-shrink: 0;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .member-info h3 { font-size: 1rem; font-family: 'Orbitron'; margin-bottom: 5px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tag-row { display: flex; align-items: center; gap: 6px; }
        .role-badge { background: #1a1a1a; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; }
        .fb-link { color: #0084ff; text-decoration: none; font-size: 1rem; margin-left: auto; }

        /* --- Responsive: ปรับจำนวนต่อบรรทัดตามขนาดหน้าจอ --- */
        @media (max-width: 1100px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); } /* หน้าจอแท็บเล็ต 2 คน */
        }
        @media (max-width: 700px) {
            .grid-container { grid-template-columns: 1fr; } /* หน้าจอมือถือ 1 คน */
            .hero-title { font-size: 1.5rem; letter-spacing: 5px; }
        }

        /* UI อื่นๆ (Admin Modal) เหมือนเดิมตามที่คุณให้มา... */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .admin-window { background: #080808; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #222; color: #fff; border-radius: 8px; }
        .btn-save { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div style="font-family: 'Orbitron'; color: var(--accent);">MEMBERS: <span id="countNumber">0</span></div>
        <button onclick="openAdmin()" style="background:none; border:none; color:#888; cursor:pointer;"><i class="fa-solid fa-shield-halved"></i> Admin</button>
    </nav>

    <header class="hero-section">
        <h1 class="hero-title">Wellesley</h1>
        <p style="color: #555; font-size: 0.7rem; letter-spacing: 3px;">SINCE 2024</p>
    </header>

    <div class="grid-container" id="memberList"></div>

    <div id="loginModal" class="modal">
        <div class="admin-window">
            <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron';">LOGIN</h2>
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-save" onclick="handleLogin()">LOGIN</button>
            <p onclick="closeModals()" style="text-align:center; margin-top:15px; cursor:pointer; font-size:0.8rem; color:#444;">CANCEL</p>
        </div>
    </div>

    <script>
        // ใช้ Config เดิมของคุณ
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];

        // ฟังก์ชันดึงข้อมูลและแสดงผล
        db.ref('members').on('value', snap => {
            const data = snap.val();
            allMembers = [];
            let html = '';
            let count = 0;

            for(let id in data) {
                const m = data[id];
                allMembers.push(m);
                count++;
                
                // ตรวจสอบ Role (เผื่อเป็น Array หรือ String)
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                const displayRole = roles[0] || 'Member';

                html += `
                <div class="member-card">
                    <div class="avatar-box">
                        <img src="${m.image || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div class="tag-row">
                            <span class="role-badge">${displayRole}</span>
                            <a href="${m.facebook}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>
                        </div>
                    </div>
                </div>`;
            }
            document.getElementById('memberList').innerHTML = html;
            document.getElementById('countNumber').innerText = count;
        });

        // ระบบ Login พื้นฐาน
        function openAdmin() { document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.getElementById('loginModal').style.display='none'; }
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') {
                alert("Login Success! (คุณสามารถเพิ่มส่วนจัดการข้อมูลต่อได้เลย)");
                closeModals();
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        }
    </script>
</body>
</html>

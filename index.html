<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT • DOKKADON</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: #aaa;
            --fb-color: #00a2ed;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Smooth Scroll & Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        /* --- Navigation --- */
        .top-nav {
            padding: 20px 5%;
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .nav-btn { 
            color: #fff; 
            text-decoration: none; 
            cursor: pointer; 
            font-size: 0.75rem; 
            font-weight: 600; 
            opacity: 0.6;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        .nav-btn:hover { opacity: 1; transform: translateY(-1px); }

        /* --- Hero Section --- */
        .hero-section { 
            text-align: center; 
            padding: 120px 20px 60px; 
            background: radial-gradient(circle at 50% 50%, #151515 0%, #050505 100%);
        }
        .main-logo { width: 110px; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.15)); transition: 0.5s; }
        .main-logo:hover { transform: scale(1.05) rotate(2deg); }

        .hero-title { 
            font-family: 'Orbitron'; 
            font-size: 2.8rem; 
            letter-spacing: 15px; 
            text-transform: uppercase; 
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff 40%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle { 
            font-size: 0.65rem; 
            color: var(--text-secondary); 
            letter-spacing: 8px; 
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* --- Stats & Search --- */
        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 30px; }
        
        .search-area { margin-bottom: 50px; }
        .search-box { position: relative; max-width: 500px; margin: 0 auto 25px; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #555; font-size: 0.9rem; }
        .search-box input {
            width: 100%; padding: 14px 20px 14px 50px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; outline: none; transition: var(--transition);
            font-size: 0.9rem;
        }
        .search-box input:focus { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .filter-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .f-btn {
            background: transparent; border: 1px solid var(--border); color: #888;
            padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; 
            font-weight: 600; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .f-btn:hover { border-color: #555; color: #fff; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: translateY(-2px); }

        /* --- Member Grid --- */
        .section-label { 
            text-align: center; 
            font-family: 'Orbitron'; 
            font-size: 0.8rem; 
            margin-bottom: 40px; 
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            opacity: 0.5;
            letter-spacing: 3px;
        }
        .section-label::before, .section-label::after { content: ""; height: 1px; width: 80px; background: linear-gradient(to right, transparent, #333, transparent); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding-bottom: 80px;
        }

        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        .member-card:hover { 
            border-color: rgba(255,255,255,0.15); 
            transform: translateY(-5px) scale(1.02); 
            background: rgba(30, 30, 30, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar-wrapper {
            width: 70px; height: 70px; border-radius: 50%; padding: 4px;
            border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
            transition: var(--transition);
        }
        .member-card:hover .avatar-wrapper { border-color: var(--fb-color); transform: rotate(5deg); }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .member-info { flex: 1; overflow: hidden; }
        .member-info h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px; }
        
        .meta-tags { display: flex; align-items: center; gap: 12px; }
        .role-tag { 
            background: rgba(255,255,255,0.05); color: #eee; padding: 4px 12px; border-radius: 6px;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05);
        }
        .fb-btn { color: var(--fb-color); text-decoration: none; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; gap: 5px; opacity: 0.8; }
        .fb-btn:hover { opacity: 1; transform: translateX(3px); }

        /* --- Admin UI --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); }
        .admin-window { background: #0a0a0a; width: 100%; max-width: 650px; max-height: 85vh; border-radius: 24px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 30px 100px rgba(0,0,0,0.8); }
        .admin-header { padding: 25px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .admin-body { padding: 25px; overflow-y: auto; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .full-width { grid-column: span 2; }
        
        input, select { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #222; 
            color: #fff; border-radius: 12px; margin-top: 8px; font-family: inherit; transition: 0.3s;
        }
        input:focus { border-color: #444; outline: none; }
        label { font-size: 0.65rem; color: #555; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        
        .btn-main { 
            width: 100%; padding: 16px; background: #fff; color: #000; border: none; 
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: var(--transition);
            letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-main:hover { background: #ccc; transform: translateY(-2px); }

        .admin-list-item {
            display: flex; justify-content: space-between; padding: 15px;
            background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 10px; font-size: 0.85rem;
            align-items: center; border: 1px solid transparent; transition: 0.3s;
        }
        .admin-list-item:hover { background: rgba(255,255,255,0.05); border-color: #222; }

        footer { padding: 60px; text-align: center; font-size: 0.6rem; color: #333; letter-spacing: 3px; text-transform: uppercase; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .member-card { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-users"></i> MEMBERS</a>
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> SYSTEM</a>
    </nav>

    <header class="hero-section">
        <img src="" alt="" class="main-logo" id="siteLogo">
        <h1 class="hero-title">DEMOWATSUT</h1>
        <p class="hero-subtitle">DEMO / WINTERFELL DEMO / DOKKADON</p>
    </header>

    <div class="container">
        <div class="search-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="ค้นหาชื่อสมาชิก..." onkeyup="renderMembers()">
            </div>
            <div class="filter-group" id="filterArea"></div>
        </div>

        <div class="section-label">
            LIST OF MEMBERS (<span id="countNumber">0</span>)
        </div>

        <div class="grid-container" id="memberList">
            </div>
    </div>

    <footer>
        © 2026 DEMOWATSUT SYSTEM. ALL RIGHTS RESERVED.
    </footer>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 380px;">
            <div class="admin-body" style="text-align: center; padding: 40px 30px;">
                <h3 style="margin-bottom: 10px; font-family: 'Orbitron'; letter-spacing: 2px;">AUTHENTICATION</h3>
                <p style="font-size: 0.7rem; color: #555; margin-bottom: 30px;">กรุณาระบุรหัสผ่านเพื่อเข้าสู่ระบบหลังบ้าน</p>
                <input type="password" id="adminPass" placeholder="••••••••" style="text-align: center; margin-bottom: 25px; font-size: 1.2rem; letter-spacing: 5px; padding: 15px;">
                <button class="btn-main" onclick="handleLogin()">VERIFY ACCESS</button>
                <p onclick="closeModals()" style="margin-top: 25px; color: #444; cursor: pointer; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;">CANCEL</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-header">
                <h3 style="font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px;">DATABASE CONTROL</h3>
                <i class="fa-solid fa-xmark" onclick="closeModals()" style="cursor: pointer; opacity: 0.5;"></i>
            </div>
            <div class="admin-body">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div>
                        <label>Display Name</label>
                        <input type="text" id="mName" placeholder="ชื่อ-นามสกุล">
                    </div>
                    <div>
                        <label>Facebook Link</label>
                        <input type="text" id="mFB" placeholder="Facebook URL">
                    </div>
                    <div class="full-width">
                        <label>Avatar Image URL</label>
                        <input type="text" id="mImg" placeholder="Link รูปภาพ">
                    </div>
                    <div class="full-width">
                        <label>Assign Categories</label>
                        <div id="mRoleCheckboxes" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; background: #000; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a;"></div>
                    </div>
                </div>
                
                <button class="btn-main" id="saveBtn" onclick="saveMember()" style="margin-bottom: 40px; background: #fff; color: #000;">บันทึกข้อมูลสมาชิก</button>

                <div style="border-top: 1px solid #1a1a1a; padding-top: 30px;">
                    <label style="display: block; margin-bottom: 15px;">Site Preferences</label>
                    <div class="form-grid" style="margin-bottom: 40px;">
                        <input type="text" id="setLogo" placeholder="Site Logo URL">
                        <input type="color" id="setTheme" style="height: 52px; cursor: pointer; padding: 5px;">
                        <button class="btn-main" onclick="saveSettings()" style="grid-column: span 2; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333;">UPDATE SYSTEM STYLE</button>
                    </div>
                </div>

                <label>Manage Existing Members</label>
                <div id="adminMemberList" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["Leader", "Member", "Wellesley", "Kodomo"];

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { 
                isAdmin = true; 
                closeModals(); 
                openAdmin(); 
                document.getElementById('adminPass').value = '';
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data) {
                if(data.logoUrl) {
                    document.getElementById('siteLogo').src = data.logoUrl;
                    document.getElementById('setLogo').value = data.logoUrl;
                }
                if(data.themeColor) {
                    document.documentElement.style.setProperty('--accent', data.themeColor);
                    document.getElementById('setTheme').value = data.themeColor;
                }
            }
        });

        async function saveSettings() {
            const logo = document.getElementById('setLogo').value;
            const color = document.getElementById('setTheme').value;
            await db.ref('settings').update({ logoUrl: logo, themeColor: color });
            alert("อัปเดตสไตล์เรียบร้อย!");
        }

        function renderCategories() {
            let filterHtml = `<button class="f-btn active" onclick="setFilter('all', this)">All</button>`;
            let checkHtml = '';
            defaultCats.forEach(name => {
                filterHtml += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                checkHtml += `<label style="font-size:0.6rem; color:#888; display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" name="roles" value="${name}"> ${name}</label>`;
            });
            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleCheckboxes').innerHTML = checkHtml;
        }

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `
                <div class="admin-list-item">
                    <span>${m.name}</span>
                    <div>
                        <i class="fa-solid fa-pen" onclick="editMember('${id}')" style="color: #00a2ed; cursor: pointer; margin-right: 20px;"></i>
                        <i class="fa-solid fa-trash" onclick="deleteMember('${id}')" style="color: #ff4d4d; cursor: pointer;"></i>
                    </div>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            renderMembers();
        });

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            const data = {
                name: document.getElementById('mName').value,
                role: roles.length > 0 ? roles : ["Member"],
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("กรุณาใส่ชื่อสมาชิก");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
            alert("บันทึกข้อมูลเรียบร้อย!");
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
            document.getElementById('saveBtn').innerText = "บันทึกข้อมูลสมาชิก";
        }

        function editMember(id) {
            const m = allMembers.find(i => i.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            const roles = Array.isArray(m.role) ? m.role : [m.role];
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = roles.includes(cb.value));
            document.getElementById('saveBtn').innerText = "อัปเดตข้อมูลสมาชิก";
            document.querySelector('.admin-body').scrollTop = 0;
        }

        async function deleteMember(id) { if(confirm("ยืนยันการลบสมาชิกรายนี้?")) await db.ref('members/'+id).remove(); }
        
        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return m.name.toLowerCase().includes(search) && (currentFilter==='all' || roles.includes(currentFilter));
            });
            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map((m, index) => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return `
                <div class="member-card" style="animation-delay: ${index * 0.05}s">
                    <div class="avatar-wrapper">
                        <img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div class="meta-tags">
                            <span class="role-tag">${roles[0] || 'Member'}</span>
                            <a href="${m.facebook}" target="_blank" class="fb-btn"><i class="fa-brands fa-facebook"></i> FB</a>
                        </div>
                    </div>
                </div>`
            }).join('');
        }

        renderCategories();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #000000;
            --card-bg: #111111;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
        }

        /* --- Navigation --- */
        .top-nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .member-counter-top {
            font-family: 'Orbitron';
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
        }

        .nav-btns { display: flex; gap: 20px; }
        .nav-btn { 
            color: #fff; 
            text-decoration: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* --- Hero --- */
        .hero-section { text-align: center; padding: 60px 20px 40px; }
        .main-logo { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; }
        .hero-title { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 15px; text-transform: uppercase; color: var(--accent); }
        .hero-subtitle { font-size: 0.75rem; color: #666; letter-spacing: 5px; margin-top: 8px; }

        /* --- Search --- */
        .search-container { max-width: 600px; margin: 0 auto 40px; padding: 0 20px; }
        .search-box input {
            width: 100%; padding: 12px 20px; background: rgba(255,255,255,0.05); border: 1px solid #222;
            border-radius: 50px; color: #fff; outline: none; transition: 0.3s; text-align: center;
        }
        .search-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        .filter-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .f-btn {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; transition: 0.3s;
        }
        .f-btn.active { background: #ffcc00; color: #000; border-color: #ffcc00; }

        /* --- Grid System (3 Columns) --- */
        .grid-header { 
            max-width: 1200px; margin: 0 auto 20px; padding: 0 20px;
            display: flex; align-items: center; gap: 10px;
            font-family: 'Orbitron'; font-size: 0.9rem; color: #fff;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 คอลัมน์ */
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        /* Responsive Grid */
        @media (max-width: 1000px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }

        /* Member Card Style */
        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .member-card:hover {
            background: #1a1a1a;
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .avatar-box {
            width: 65px; height: 65px; border-radius: 50%; overflow: hidden;
            border: 2px solid #333; flex-shrink: 0;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .member-info { flex: 1; min-width: 0; }
        .member-info h3 { 
            font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .tag-row { display: flex; align-items: center; gap: 10px; }
        .role-badge {
            background: #333; color: #fff; padding: 3px 10px; border-radius: 6px;
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
        }
        .fb-link { color: #00acee; text-decoration: none; font-size: 0.85rem; }

        /* Footer */
        footer { padding: 40px; text-align: left; font-size: 0.75rem; color: #444; max-width: 1200px; margin: 0 auto; }

        /* Admin/Login Modals (คงเดิมแต่ปรับ UI เล็กน้อย) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .admin-window { background: #0c0c0c; width: 90%; max-width: 500px; border-radius: 15px; border: 1px solid #222; padding: 25px; }
        .btn-save { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; margin-top: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-btns">
            <a class="nav-btn" onclick="location.reload()">
                <i class="fa-solid fa-users"></i> Members
            </a>
            <a class="nav-btn" onclick="openAdmin()">
                <i class="fa-solid fa-shield-halved"></i> Admin
            </a>
        </div>
    </nav>

    <header class="hero-section">
        <img src="" alt="" class="main-logo" id="siteLogo">
        <h1 class="hero-title">WELLESLEY</h1>
        <p class="hero-subtitle">SINCE 2024</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="renderMembers()">
        </div>
        <div class="filter-group" id="filterArea"></div>
    </div>

    <div class="grid-header">
        <i class="fa-solid fa-user-group"></i> MEMBERS (<span id="countNumber">0</span>)
    </div>

    <div class="grid-container" id="memberList">
        </div>

    <footer>
        Activate Windows<br>
        Go to Settings to activate Windows.
    </footer>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 300px;">
            <h3 style="text-align: center; margin-bottom: 20px; font-family: 'Orbitron';">ADMIN LOGIN</h3>
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-save" onclick="handleLogin()">LOGIN</button>
            <button onclick="closeModals()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Close</button>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window" style="max-width: 600px; max-height: 80vh; overflow-y: auto;">
            <h3 style="margin-bottom: 20px;">DATABASE MANAGEMENT</h3>
            <input type="hidden" id="editId">
            <label>Name</label><input type="text" id="mName">
            <label>Avatar URL</label><input type="text" id="mImg">
            <label>Facebook URL</label><input type="text" id="mFB">
            <label>Category</label>
            <div id="mRoleCheckboxes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;"></div>
            
            <button class="btn-save" onclick="saveMember()">SAVE MEMBER</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #222;">
            <div id="adminMemberList"></div>
            <button onclick="closeModals()" class="btn-save" style="background:#222; color:#fff;">CLOSE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["Leader", "Member", "Wellesley", "Kodomo"];

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { 
                isAdmin = true; closeModals(); openAdmin(); 
            } else { alert("Wrong Password"); }
        }

        // Load Settings
        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data && data.logoUrl) document.getElementById('siteLogo').src = data.logoUrl;
        });

        function renderCategories() {
            let filterHtml = `<button class="f-btn active" onclick="setFilter('all', this)">All</button>`;
            let checkHtml = '';
            defaultCats.forEach(name => {
                filterHtml += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                checkHtml += `<label style="font-size:0.8rem;"><input type="checkbox" name="roles" value="${name}"> ${name}</label>`;
            });
            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleCheckboxes').innerHTML = checkHtml;
        }

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px; border-radius:8px; margin-bottom:8px;">
                    <span style="font-size:0.9rem;">${m.name}</span>
                    <div>
                        <button onclick="editMember('${id}')" style="color:cyan; background:none; border:none; cursor:pointer; margin-right:15px;"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deleteMember('${id}')" style="color:red; background:none; border:none; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            renderMembers();
        });

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            const data = {
                name: document.getElementById('mName').value,
                role: roles,
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Please enter name");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
        }

        function editMember(id) {
            const m = allMembers.find(i => i.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            const roles = Array.isArray(m.role) ? m.role : [m.role];
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = roles.includes(cb.value));
        }

        async function deleteMember(id) { if(confirm("Delete?")) await db.ref('members/'+id).remove(); }

        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return m.name.toLowerCase().includes(search) && (currentFilter==='all' || roles.includes(currentFilter));
            });
            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return `
                <div class="member-card">
                    <div class="avatar-box"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div class="tag-row">
                            <span class="role-badge">${roles[0] || 'Member'}</span>
                            <a href="${m.facebook}" target="_blank" class="fb-link">Facebook</a>
                        </div>
                    </div>
                </div>`
            }).join('');
        }

        renderCategories();
    </script>
</body>
</html>

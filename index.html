<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELLESLEY - MEMBER LIST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #000000;
            --card-bg: #0e0e0e;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Navigation --- */
        .top-nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .member-counter-top {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 6px 18px;
            border-radius: 50px;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .nav-btns { display: flex; gap: 20px; }
        .nav-btn { color: #888; text-decoration: none; cursor: pointer; transition: var(--transition); font-size: 0.85rem; font-weight: 600; }
        .nav-btn:hover { color: var(--accent); transform: translateY(-2px); }

        /* --- Hero --- */
        .hero-section { text-align: center; padding: 40px 20px 20px; }
        .main-logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 0 15px var(--accent)); }
        .hero-title { font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; color: var(--accent); margin-right: -12px; }
        .hero-subtitle { font-size: 0.7rem; color: #555; letter-spacing: 4px; margin-top: 5px; font-weight: 400; }

        /* --- Search & Filter --- */
        .search-container { max-width: 1200px; margin: 0 auto 30px; padding: 0 20px; width: 100%; }
        .search-box input {
            width: 100%; padding: 12px 25px; background: #0a0a0a; border: 1px solid #1a1a1a;
            border-radius: 100px; color: #fff; outline: none; transition: var(--transition); font-family: 'Bai Jamjuree';
        }
        .search-box input:focus { border-color: var(--accent); background: #111; }
        
        .filter-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
        .f-btn {
            background: #0a0a0a; border: 1px solid #1a1a1a; color: #555;
            padding: 6px 14px; border-radius: 100px; cursor: pointer; font-size: 0.7rem; transition: var(--transition);
        }
        .f-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

        /* --- Member Grid (3 Columns) --- */
        .grid-header { max-width: 1200px; margin: 20px auto 10px; padding: 0 20px; color: #444; font-family: 'Orbitron'; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; }
        
        .grid-container {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* บังคับ 3 คอลัมน์หลัก */
            gap: 20px; 
            padding: 0 20px 50px; 
            max-width: 1200px; 
            margin: 0 auto; 
            flex: 1;
            width: 100%;
        }

        /* ปรับสัดส่วนสำหรับ Tablet และ Mobile */
        @media (max-width: 1024px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .grid-container { grid-template-columns: 1fr; } }

        .member-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px;
            padding: 15px; display: flex; align-items: center; gap: 15px; transition: var(--transition);
            animation: fadeInUp 0.5s ease forwards; opacity: 0;
            position: relative; overflow: hidden;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .member-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent); 
            background: #121212;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }

        .avatar-box { 
            width: 55px; height: 55px; border-radius: 50%; overflow: hidden; 
            border: 2px solid #222; flex-shrink: 0; transition: var(--transition);
        }
        .member-card:hover .avatar-box { border-color: var(--accent); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .member-info { flex: 1; min-width: 0; }
        .member-info h3 { font-size: 0.95rem; font-family: 'Bai Jamjuree'; font-weight: 600; margin-bottom: 4px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tag-row { display: flex; align-items: center; gap: 6px; }
        .role-label { 
            background: #1a1a1a; color: #888; padding: 2px 8px; border-radius: 4px; 
            font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
        }
        .fb-link { color: #00c3ff; text-decoration: none; font-size: 0.85rem; transition: 0.3s; margin-left: auto; }
        .fb-link:hover { opacity: 0.7; transform: scale(1.1); }

        /* --- Footer --- */
        footer { padding: 30px; text-align: center; font-size: 0.7rem; color: #333; border-top: 1px solid var(--border); margin-top: auto; }

        /* --- Admin System --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .admin-window { background: #080808; width: 95%; max-width: 800px; height: 85vh; border: 1px solid #222; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .admin-header { padding: 20px; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .admin-tabs { display: flex; background: #0c0c0c; border-bottom: 1px solid #222; }
        .tab { padding: 12px 20px; cursor: pointer; color: #444; font-size: 0.75rem; font-weight: 700; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .admin-body { padding: 20px; overflow-y: auto; flex: 1; }
        .admin-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 8px; margin-top: 5px; font-family: 'Bai Jamjuree'; outline: none; }
        input:focus { border-color: var(--accent); }
        label { font-size: 0.75rem; color: #666; font-weight: 600; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 15px; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-save:hover { opacity: 0.9; transform: scale(0.99); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="member-counter-top">
            <i class="fa-solid fa-users-viewfinder"></i> <span id="countNumber">0</span>
        </div>
        <div class="nav-btns">
            <a class="nav-btn" onclick="location.reload()">MEMBERS</a>
            <a class="nav-btn" onclick="openAdmin()">ADMIN</a>
        </div>
    </nav>

    <header class="hero-section">
        <img src="" alt="Logo" class="main-logo" id="siteLogo">
        <h1 class="hero-title">WELLESLEY</h1>
        <p class="hero-subtitle">SINCE 2024</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search member name..." onkeyup="renderMembers()">
        </div>
        <div class="filter-group" id="filterArea"></div>
    </div>

    <div class="grid-header">
        <i class="fa-solid fa-address-book"></i> MEMBERS LIST
    </div>
    <div class="grid-container" id="memberList"></div>

    <footer>
        © 2026 WELLESLEY GANG. ALL RIGHTS RESERVED.
    </footer>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 350px; height: auto;">
            <div class="admin-body" style="text-align: center; padding: 30px;">
                <h3 style="font-family:'Orbitron'; margin-bottom: 20px;">LOGIN</h3>
                <input type="password" id="adminPass" placeholder="Password">
                <button class="btn-save" onclick="handleLogin()">LOGIN</button>
                <p onclick="closeModals()" style="margin-top: 15px; color: #444; cursor: pointer; font-size: 0.7rem;">CLOSE</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-header">
                <h4 style="font-family:'Orbitron';">DATABASE MANAGEMENT</h4>
                <button onclick="closeModals()" style="background:none; border:none; color:#fff; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="admin-tabs">
                <div class="tab active" onclick="switchTab('members', this)">MEMBERS</div>
                <div class="tab" onclick="switchTab('settings', this)">SITE SETTINGS</div>
            </div>
            <div class="admin-body" id="memberTabContent">
                <input type="hidden" id="editId">
                <div class="admin-form-grid">
                    <div><label>Display Name</label><input type="text" id="mName"></div>
                    <div><label>Facebook Link</label><input type="text" id="mFB"></div>
                    <div style="grid-column: span 2;"><label>Avatar URL</label><input type="text" id="mImg"></div>
                    <div style="grid-column: span 2;">
                        <label>Category</label>
                        <div id="mRoleCheckboxes" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"></div>
                    </div>
                </div>
                <button class="btn-save" id="saveBtn" onclick="saveMember()">SAVE MEMBER</button>
                <div id="adminMemberList" style="margin-top: 20px;"></div>
            </div>
            <div class="admin-body" id="settingsTabContent" style="display: none;">
                <label>Site Logo URL</label><input type="text" id="setLogo">
                <label>Theme Color</label><input type="color" id="setTheme" style="height:50px; padding:5px; cursor:pointer;">
                <button class="btn-save" onclick="saveSettings()">UPDATE SETTINGS</button>
            </div>
        </div>
    </div>

    <script>
        // Config & Initialization
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["Leader", "Member", "Wellesley", "Kodomo"];

        // Modal Handlers
        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { isAdmin = true; closeModals(); openAdmin(); } 
            else { alert("Wrong Password"); }
        }
        function switchTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('memberTabContent').style.display = tab === 'members' ? 'block' : 'none';
            document.getElementById('settingsTabContent').style.display = tab === 'settings' ? 'block' : 'none';
        }

        // Settings Observer
        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data) {
                if(data.logoUrl) document.getElementById('siteLogo').src = data.logoUrl;
                if(data.themeColor) document.documentElement.style.setProperty('--accent', data.themeColor);
            }
        });

        async function saveSettings() {
            const logo = document.getElementById('setLogo').value;
            const color = document.getElementById('setTheme').value;
            await db.ref('settings').update({ logoUrl: logo, themeColor: color });
            alert("Settings Updated!");
        }

        // Categories & Filter Rendering
        function renderCategories() {
            let filterHtml = `<button class="f-btn active" onclick="setFilter('all', this)">All</button>`;
            let checkHtml = '';
            defaultCats.forEach(name => {
                filterHtml += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                checkHtml += `<label style="font-size:0.7rem; color:#888; display:flex; align-items:center; gap:5px;"><input type="checkbox" name="roles" value="${name}"> ${name}</label>`;
            });
            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleCheckboxes').innerHTML = checkHtml;
        }

        // Members Observer
        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:12px; border-radius:10px; margin-bottom:8px; border:1px solid #222;">
                    <span style="font-size:0.85rem;">${m.name}</span>
                    <div>
                        <button onclick="editMember('${id}')" style="color:#00ffff; background:none; border:none; cursor:pointer; margin-right:15px; font-size:1rem;"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteMember('${id}')" style="color:#ff4444; background:none; border:none; cursor:pointer; font-size:1rem;"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            renderMembers();
        });

        // Member CRUD
        async function saveMember() {
            const id = document.getElementById('editId').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            const data = {
                name: document.getElementById('mName').value,
                role: roles,
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Please enter name");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
            document.getElementById('saveBtn').innerText = "SAVE MEMBER";
        }

        function editMember(id) {
            const m = allMembers.find(i => i.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            const roles = Array.isArray(m.role) ? m.role : [m.role];
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = roles.includes(cb.value));
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
            document.getElementById('memberTabContent').scrollTo({top: 0, behavior: 'smooth'});
        }

        async function deleteMember(id) { if(confirm("Are you sure you want to delete this member?")) await db.ref('members/'+id).remove(); }
        
        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        // Final UI Rendering
        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return m.name.toLowerCase().includes(search) && (currentFilter==='all' || roles.includes(currentFilter));
            });
            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map((m, idx) => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return `
                <div class="member-card" style="animation-delay: ${idx * 0.05}s">
                    <div class="avatar-box"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div class="tag-row">
                            <span class="role-label">${roles[0] || 'Member'}</span>
                            <a href="${m.facebook}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>
                        </div>
                    </div>
                </div>`
            }).join('');
        }

        renderCategories();
    </script>
</body>
</html>

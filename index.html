<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(17, 17, 17, 0.9);
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --fb-color: #1877f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background-color: var(--bg); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; 
        }

        #weather-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        /* Search & Filter Styles */
        .search-section { max-width: 600px; margin: 0 auto 40px; text-align: center; }
        .search-box { 
            width: 100%; background: #141619; border: 1px solid #2a2d31; padding: 12px 20px;
            border-radius: 30px; color: #fff; font-family: 'Inter'; font-size: 14px; margin-bottom: 20px;
            outline: none; transition: var(--transition);
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 193, 7, 0.2); }

        .filter-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .tab-btn { 
            background: transparent; border: 1px solid #2a2d31; color: #888; 
            padding: 8px 25px; border-radius: 20px; cursor: pointer; font-family: 'Orbitron';
            font-size: 11px; transition: var(--transition); text-transform: uppercase;
        }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .tab-btn:hover:not(.active) { border-color: #555; color: #fff; }

        .top-nav { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .config-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; font-weight: bold; }
        
        .hero { padding: 140px 20px 40px; text-align: center; position: relative; z-index: 100; }
        .hero img { max-width: 120px; margin-bottom: 15px; filter: drop-shadow(0 0 15px var(--accent)); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(24px, 5vw, 50px); letter-spacing: 10px; color: #fff; margin-bottom: 5px; }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 100; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; transition: var(--transition); backdrop-filter: blur(5px); }
        .member-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .avatar { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .rank-tag { font-family: 'Orbitron'; font-size: 9px; font-weight: bold; padding: 3px 10px; border-radius: 4px; color: #000; text-transform: uppercase; }

        /* Admin UI */
        .admin-panel { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 6000; overflow-y: auto; padding: 40px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .admin-card { background: #141414; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        input, select { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; margin-bottom: 15px; }
        .btn-save { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .notify { position: fixed; bottom: 30px; left: 30px; background: #202124; padding: 12px 24px; color: #fff; border-radius: 4px; z-index: 10000; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .music-ctrl { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; color: #000; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 7000; backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <canvas id="weather-canvas"></canvas>
    <div id="notification-container"></div>
    <div id="yt-player-container"><div id="player"></div></div>

    <div id="loginModal" class="modal-overlay">
        <div style="background: #1a1c1e; padding: 30px; border-radius: 16px; width: 350px; text-align: center;">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">ADMIN LOGIN</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button class="config-btn" style="width:100%; padding:12px;" onclick="attemptLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px;">
            MEMBERS: <span id="countNum" style="color:var(--accent)">0</span>
        </div>
        <button class="config-btn" onclick="document.getElementById('loginModal').style.display='flex'"><i class="fa-solid fa-shield-halved"></i> ADMIN</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:10px; opacity:0.5; letter-spacing:5px;">MEMBER ROLE SYSTEM</p>
    </header>

    <div class="search-section">
        <input type="text" class="search-box" id="memberSearch" placeholder="Search members..." oninput="renderMembers()">
        <div class="filter-tabs" id="filterTabs">
            <button class="tab-btn active" onclick="filterByRole('all', this)">ALL</button>
            </div>
    </div>

    <div id="memberList" class="member-grid"></div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 30px;">
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">ADMIN DASHBOARD</h2>
            <button class="config-btn" style="background:#ff4444; color:#fff;" onclick="location.reload()">CLOSE PANEL</button>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <div style="border-left:4px solid var(--accent); padding-left:15px; margin-bottom:20px; font-family:'Orbitron'; font-size:14px;">SITE CONFIG</div>
                <label style="font-size:10px; color:var(--accent);">SITE NAME</label><input type="text" id="configSiteName">
                <label style="font-size:10px; color:var(--accent);">DESCRIPTION</label><input type="text" id="configSiteDesc">
                <label style="font-size:10px; color:var(--accent);">LOGO URL</label><input type="text" id="configLogoUrl">
                <button class="btn-save" style="background:var(--accent);" onclick="saveConfig()">SAVE CONFIG</button>
            </div>

            <div class="admin-card">
                <div style="border-left:4px solid var(--accent); padding-left:15px; margin-bottom:20px; font-family:'Orbitron'; font-size:14px;">ROLES & HEADERS</div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="newRoleName" placeholder="Role/Header Name" style="margin-bottom:0;">
                    <input type="color" id="newRoleColor" value="#ffc107" style="width:80px; height:45px; padding:5px; margin-bottom:0;">
                </div>
                <button class="btn-save" style="background:#fff; color:#000; margin-top:15px;" onclick="addRole()">+ ADD ROLE/HEADER</button>
                <div id="roleListContainer" style="margin-top:15px; max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div class="admin-card" style="grid-column: 1 / -1;">
                <div style="border-left:4px solid var(--accent); padding-left:15px; margin-bottom:20px; font-family:'Orbitron'; font-size:14px;">MEMBER MANAGEMENT</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <input type="text" id="memName" placeholder="Name">
                    <input type="text" id="memImg" placeholder="Avatar URL">
                    <input type="text" id="memFb" placeholder="Facebook URL">
                    <select id="memRole"></select>
                </div>
                <input type="hidden" id="editMemId">
                <button id="memBtn" class="btn-save" style="background:var(--accent);" onclick="saveMember()">ADD NEW MEMBER</button>
                <div id="adminMemberList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player, currentRoles = {}, currentMembers = {}, activeFilter = 'all';

        // --- Site Engine ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.desc || 'MEMBER ROLE SYSTEM';
            document.getElementById('siteLogo').src = d.logo || '';
            document.getElementById('configSiteName').value = d.name || '';
            document.getElementById('configSiteDesc').value = d.desc || '';
            document.getElementById('configLogoUrl').value = d.logo || '';
        });

        function saveConfig() {
            db.ref('config').update({
                name: document.getElementById('configSiteName').value,
                desc: document.getElementById('configSiteDesc').value,
                logo: document.getElementById('configLogoUrl').value
            }).then(() => showNotify("CONFIG SAVED"));
        }

        // --- Roles & Tabs ---
        db.ref('roles').on('value', snap => {
            currentRoles = snap.val() || {};
            let options = '<option value="">NO ROLE</option>', listHtml = '', tabsHtml = '<button class="tab-btn active" onclick="filterByRole(\'all\', this)">ALL</button>';
            
            Object.keys(currentRoles).forEach(id => {
                const r = currentRoles[id];
                options += `<option value="${id}">${r.name}</option>`;
                listHtml += `<div style="display:flex; justify-content:space-between; padding:10px; background:#000; margin-bottom:5px; border-radius:5px;">
                    <span style="color:${r.color}">${r.name}</span>
                    <i class="fa-solid fa-trash" style="cursor:pointer; color:#ff4444" onclick="db.ref('roles').child('${id}').remove()"></i>
                </div>`;
                tabsHtml += `<button class="tab-btn" onclick="filterByRole('${id}', this)">${r.name}</button>`;
            });

            document.getElementById('memRole').innerHTML = options;
            document.getElementById('roleListContainer').innerHTML = listHtml;
            document.getElementById('filterTabs').innerHTML = tabsHtml;
            renderMembers();
        });

        function addRole() {
            const name = document.getElementById('newRoleName').value;
            const color = document.getElementById('newRoleColor').value;
            if(name) db.ref('roles').push({ name, color }).then(() => document.getElementById('newRoleName').value = '');
        }

        // --- Members logic ---
        db.ref('members').on('value', snap => {
            currentMembers = snap.val() || {};
            renderMembers();
        });

        function filterByRole(roleId, btn) {
            activeFilter = roleId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('memberSearch').value.toLowerCase();
            let html = '', adminHtml = '', count = 0;

            Object.keys(currentMembers).forEach(id => {
                const m = currentMembers[id];
                const role = currentRoles[m.roleId] || { name: 'MEMBER', color: '#888' };
                
                // Filter logic
                const matchesSearch = m.name.toLowerCase().includes(search);
                const matchesRole = activeFilter === 'all' || m.roleId === activeFilter;

                if(matchesSearch && matchesRole) {
                    count++;
                    html += `<div class="member-card">
                        <img src="${m.img || 'https://i.imgur.com/6VBx3io.png'}" class="avatar">
                        <div>
                            <div style="font-weight:600; font-size:14px;">${m.name}</div>
                            <span class="rank-tag" style="background:${role.color}">${role.name}</span>
                        </div>
                        <a href="${m.fb}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>
                    </div>`;
                }

                adminHtml += `<div style="background:#000; padding:10px; border-radius:8px; display:flex; justify-content:space-between;">
                    <span>${m.name}</span>
                    <div>
                        <i class="fa-solid fa-pen" style="cursor:pointer; margin-right:10px; color:#4af" onclick="editMember('${id}')"></i>
                        <i class="fa-solid fa-trash" style="cursor:pointer; color:#f44" onclick="db.ref('members').child('${id}').remove()"></i>
                    </div>
                </div>`;
            });

            document.getElementById('memberList').innerHTML = html;
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            document.getElementById('countNum').innerText = count;
        }

        function saveMember() {
            const id = document.getElementById('editMemId').value;
            const data = {
                name: document.getElementById('memName').value,
                img: document.getElementById('memImg').value,
                fb: document.getElementById('memFb').value,
                roleId: document.getElementById('memRole').value
            };
            if(!data.name) return alert("Please enter name");
            const ref = id ? db.ref('members').child(id) : db.ref('members').push();
            ref.set(data).then(() => {
                showNotify("MEMBER SAVED");
                document.getElementById('editMemId').value = '';
                document.getElementById('memName').value = '';
                document.getElementById('memImg').value = '';
                document.getElementById('memFb').value = '';
                document.getElementById('memBtn').innerText = "ADD NEW MEMBER";
            });
        }

        function editMember(id) {
            const m = currentMembers[id];
            document.getElementById('editMemId').value = id;
            document.getElementById('memName').value = m.name;
            document.getElementById('memImg').value = m.img;
            document.getElementById('memFb').value = m.fb;
            document.getElementById('memRole').value = m.roleId;
            document.getElementById('memBtn').innerText = "UPDATE MEMBER";
            showNotify("EDITING: " + m.name);
        }

        // --- Auth & UI ---
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                document.getElementById('loginModal').style.display='none';
                document.getElementById('adminPanel').style.display='block';
            } else { alert("WRONG PASSWORD"); }
        }

        function showNotify(msg) {
            const t = document.createElement('div'); t.className = 'notify';
            t.innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--accent)"></i> ${msg}`;
            document.getElementById('notification-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // --- YouTube & Weather ---
        function toggleMusic() {
            if(!player) return;
            const icon = document.getElementById('musicIcon');
            if(player.getPlayerState() === 1) { player.pauseVideo(); icon.className = 'fa-solid fa-play'; }
            else { player.playVideo(); icon.className = 'fa-solid fa-pause'; }
        }
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { height: '0', width: '0', videoId: 'PAMYc_MkqkM', playerVars: { 'autoplay': 1, 'loop': 1 } });
        }
    </script>
</body>
</html>

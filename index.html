<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT | DATABASE PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.3);
            --bg: #050505;
            --bg-img: url('');
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        /* --- Nav Style --- */
        .nav-outer { padding: 20px 5%; position: sticky; top: 0; z-index: 1000; }
        .nav-container {
            background: rgba(10, 10, 10, 0.85); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 12px 30px; display: flex;
            justify-content: space-between; align-items: center; backdrop-filter: blur(15px);
        }
        .nav-left { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px; }
        .nav-right { display: flex; gap: 20px; }
        .nav-link { color: #eee; text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--accent); }

        /* --- Hero --- */
        .hero { text-align: center; padding: 40px 20px; }
        .main-title { font-family: 'Orbitron'; font-size: 3rem; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 10px; }

        /* --- Search & Filters --- */
        .controls { max-width: 800px; margin: 0 auto 30px; padding: 0 20px; text-align: center; }
        .search-box input {
            width: 100%; padding: 12px 25px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 100px; color: #fff; outline: none;
        }
        .filter-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        .f-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; padding: 5px 15px; border-radius: 100px; cursor: pointer; font-size: 0.7rem; transition: 0.3s;
        }
        .f-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* --- Grid & Cards --- */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; padding: 0 5% 100px; max-width: 1400px; margin: 0 auto;
        }
        .card {
            background: rgba(15, 15, 15, 0.8); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 18px; display: flex; align-items: center; gap: 15px;
        }
        .avatar-wrap { width: 70px; height: 70px; flex-shrink: 0; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #222; }
        .info h3 { font-size: 1rem; margin-bottom: 5px; font-family: 'Orbitron'; }
        .role-tag { background: #333; color: #ccc; padding: 2px 10px; border-radius: 4px; font-size: 0.65rem; }

        /* --- Admin Modal & Foldable --- */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; backdrop-filter: blur(10px); align-items: center; justify-content: center;
        }
        .admin-box {
            background: #0a0a0a; width: 95%; max-width: 500px; max-height: 90vh;
            border: 1px solid var(--accent); padding: 20px; overflow-y: auto; border-radius: 12px;
        }
        .admin-section { margin-bottom: 12px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .admin-header { padding: 12px; background: #111; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; font-family: 'Orbitron'; color: var(--accent); }
        .admin-content { padding: 15px; display: none; background: #050505; }
        
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; font-size: 0.9rem; }
        .primary-btn { width: 100%; padding: 12px; background: var(--accent); border: none; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; color:#000; border-radius: 5px; }

        /* --- Admin List Items --- */
        .admin-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid #222; font-size: 0.8rem;
        }
        .action-btns i { cursor: pointer; margin-left: 10px; transition: 0.2s; }
        .fa-edit:hover { color: var(--accent); }
        .fa-trash:hover { color: #ff4d4d; }

        .music-player { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 10px; z-index: 900; }
        #yt-player { display: none; }
    </style>
</head>
<body>

    <div class="nav-outer">
        <nav class="nav-container">
            <div class="nav-left">
                <i class="fa-solid fa-shield-cat" style="color:var(--accent)"></i> <span id="navTitle">DEMOWATSUT</span>
            </div>
            <div class="nav-right">
                <a class="nav-link" onclick="location.reload()"><i class="fa-solid fa-house"></i> Home</a>
                <a class="nav-link" onclick="openLogin()"><i class="fa-solid fa-lock"></i> Admin</a>
            </div>
        </nav>
    </div>

    <header class="hero">
        <h1 class="main-title">DATABASE</h1>
        <p style="letter-spacing: 5px; font-size: 0.6rem; color: #555;">MEMBERS: <span id="countNumber" style="color:var(--accent)">0</span></p>
    </header>

    <div class="controls">
        <div class="search-box"><input type="text" id="searchInput" placeholder="Search data..." onkeyup="renderMembers()"></div>
        <div class="filter-group" id="filterArea"></div>
    </div>

    <div class="grid-container" id="memberList"></div>

    <div id="loginModal" class="modal-overlay">
        <div class="admin-box">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px;">LOGIN</h2>
            <input type="password" id="adminPass" placeholder="ENTER PASSWORD">
            <button class="primary-btn" onclick="handleLogin()">ACCESS</button>
            <button style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;" onclick="closeModals()">CLOSE</button>
        </div>
    </div>

    <div id="adminPanel" class="modal-overlay">
        <div class="admin-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="font-family:'Orbitron'; color:var(--accent);">ADMIN PANEL</h3>
                <button onclick="handleLogout()" style="background:none; border:none; color:red; cursor:pointer;">EXIT</button>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)"><span id="formTitle">+ ADD / EDIT MEMBER</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="admin-content" id="formContent" style="display:block;">
                    <input type="hidden" id="editId">
                    <input type="text" id="mName" placeholder="Display Name">
                    <select id="mRoleSelect"></select>
                    <input type="text" id="mImg" placeholder="Image URL">
                    <input type="text" id="mFB" placeholder="Social Link">
                    <button class="primary-btn" id="saveBtn" onclick="saveMember()">SAVE DATA</button>
                    <button id="cancelEdit" style="display:none; width:100%; background:none; color:#777; border:none; margin-top:5px; cursor:pointer;" onclick="resetForm()">Cancel Edit</button>
                </div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)"><span>👥 MANAGE MEMBERS</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="admin-content" id="adminMemberList">
                    </div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)"><span># CATEGORIES</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="admin-content">
                    <input type="text" id="newCat" placeholder="New Unit Name">
                    <button class="primary-btn" onclick="addCategory()">ADD UNIT</button>
                    <div id="adminCatList" style="margin-top:10px;"></div>
                </div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)"><span>🎨 THEME & MUSIC</span> <i class="fa-solid fa-chevron-down"></i></div>
                <div class="admin-content">
                    <label style="font-size:0.7rem;">Theme Color:</label>
                    <input type="color" id="themeColor">
                    <input type="text" id="bgUrlInput" placeholder="Wallpaper URL">
                    <input type="text" id="musicIdInput" placeholder="YouTube Video ID">
                    <button class="primary-btn" onclick="saveSettings()">APPLY THEME</button>
                </div>
            </div>

            <button class="primary-btn" style="background:#222; color:#fff;" onclick="closeModals()">DONE</button>
        </div>
    </div>

    <div class="music-player">
        <button onclick="toggleMusic()" style="background:var(--accent); border:none; width:30px; height:30px; border-radius:50%; cursor:pointer;">
            <i class="fas fa-play" id="playIcon"></i>
        </button>
        <span id="trackName" style="font-size: 0.55rem; color:#fff; font-family:'Orbitron';">BGM: -</span>
    </div>

    <div id="yt-player"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let categories = [];
        let currentFilter = 'all';
        let isAdmin = false;

        // --- Core ---
        function openLogin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { isAdmin=true; closeModals(); openLogin(); }
            else alert("Wrong Key");
        }
        function handleLogout() { isAdmin=false; location.reload(); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
        function toggleAdminSection(el) {
            const content = el.nextElementSibling;
            content.style.display = (content.style.display==='block') ? 'none' : 'block';
        }

        // --- Database Watchers ---
        db.ref('settings').on('value', snap => {
            const s = snap.val() || {};
            if(s.color) document.documentElement.style.setProperty('--accent', s.color);
            if(s.bg) document.documentElement.style.setProperty('--bg-img', `url('${s.bg}')`);
            if(player && s.music) player.loadVideoById(s.music);
        });

        db.ref('categories').on('value', snap => {
            const data = snap.val();
            let html = `<button class="f-btn active" onclick="setFilter('all', this)">All</button>`;
            let selectHtml = '';
            let adminCatHtml = '';
            for(let id in data) {
                const name = data[id].name;
                html += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                selectHtml += `<option value="${name}">${name}</option>`;
                adminCatHtml += `<div class="admin-list-item">${name} <i class="fa-solid fa-trash" onclick="deleteCat('${id}')"></i></div>`;
            }
            document.getElementById('filterArea').innerHTML = html;
            document.getElementById('mRoleSelect').innerHTML = selectHtml;
            document.getElementById('adminCatList').innerHTML = adminCatHtml;
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminListHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminListHtml += `
                    <div class="admin-list-item">
                        <span>${m.name} (${m.role})</span>
                        <div class="action-btns">
                            <i class="fa-solid fa-edit" onclick="editMember('${id}')"></i>
                            <i class="fa-solid fa-trash" onclick="deleteMember('${id}')"></i>
                        </div>
                    </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminListHtml;
            renderMembers();
        });

        // --- Actions ---
        async function saveMember() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('mName').value,
                role: document.getElementById('mRoleSelect').value,
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Enter Name");
            
            if(id) await db.ref('members/'+id).set(data);
            else await db.ref('members').push(data);
            
            resetForm();
            alert("Data Saved!");
        }

        function editMember(id) {
            const m = allMembers.find(item => item.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mRoleSelect').value = m.role;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.getElementById('formTitle').innerText = "✏️ EDITING: " + m.name;
            document.getElementById('saveBtn').innerText = "UPDATE DATA";
            document.getElementById('cancelEdit').style.display = "block";
            document.getElementById('formContent').style.display = "block";
        }

        async function deleteMember(id) { if(confirm("Delete this member?")) await db.ref('members/'+id).remove(); }
        async function deleteCat(id) { if(confirm("Delete this category?")) await db.ref('categories/'+id).remove(); }
        
        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.getElementById('formTitle').innerText = "+ ADD NEW MEMBER";
            document.getElementById('saveBtn').innerText = "SAVE MEMBER";
            document.getElementById('cancelEdit').style.display = "none";
        }

        async function addCategory() {
            const name = document.getElementById('newCat').value;
            if(name) await db.ref('categories').push({ name });
            document.getElementById('newCat').value = '';
        }

        async function saveSettings() {
            await db.ref('settings').update({
                color: document.getElementById('themeColor').value,
                bg: document.getElementById('bgUrlInput').value,
                music: document.getElementById('musicIdInput').value
            });
            alert("Applied!");
        }

        // --- Rendering ---
        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => (currentFilter==='all' || m.role===currentFilter) && m.name.toLowerCase().includes(search));
            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map(m => `
                <div class="card">
                    <div class="avatar-wrap"><img src="${m.image}" class="avatar" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div class="info">
                        <h3>${m.name}</h3>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="role-tag">${m.role}</span>
                            <a href="${m.facebook}" target="_blank" style="color:#00acee; font-size:0.8rem;"><i class="fab fa-facebook"></i></a>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- Music ---
        let player;
        function onYouTubeIframeAPIReady() {
            db.ref('settings/music').once('value', snap => {
                const mid = snap.val() || 'xy3AcmW0lrQ';
                player = new YT.Player('yt-player', {
                    height: '0', width: '0', videoId: mid,
                    playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': mid },
                    events: { 'onReady': e => { e.target.setVolume(30); document.getElementById('trackName').innerText = "BGM: Active"; } }
                });
            });
        }
        function toggleMusic() {
            const icon = document.getElementById('playIcon');
            if (player.getPlayerState() === 1) { player.pauseVideo(); icon.className = "fas fa-play"; }
            else { player.playVideo(); icon.className = "fas fa-pause"; }
        }
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
        document.addEventListener('click', () => { if(player) player.playVideo(); }, { once: true });
    </script>
</body>
</html>

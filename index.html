<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT | PREMIER SYSTEM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.3);
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Bai Jamjuree', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0a0a0a 0%, transparent 30%);
            min-height: 100vh;
        }

        /* --- Header / Nav --- */
        .nav-container {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .member-counter {
            font-family: 'Orbitron', sans-serif;
            background: var(--glass);
            border: 1px solid var(--accent);
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px var(--accent-glow);
        }

        .member-counter span {
            color: var(--accent);
            font-weight: 900;
        }

        .admin-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: #888;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Orbitron';
            font-size: 0.6rem;
            margin-left: 15px;
        }

        .admin-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        /* --- Hero --- */
        .hero {
            text-align: center;
            padding: 60px 20px 30px;
            animation: fadeInUp 1s ease;
        }

        .main-title {
            font-family: 'Orbitron';
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 12px;
            margin-bottom: 5px;
        }

        /* --- Controls --- */
        .controls {
            max-width: 1000px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: #fff;
            outline: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .search-box input:focus { border-color: var(--accent); }

        .filter-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .f-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: #666;
            padding: 6px 18px;
            border-radius: 100px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Orbitron';
            font-size: 0.65rem;
        }

        .f-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* --- Member Cards --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 5% 120px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(10,10,10,0.6);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .card:hover { border-color: var(--accent); transform: scale(1.02); }

        .avatar {
            width: 65px; height: 65px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        .role-tag {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 2px 8px;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 4px;
        }

        /* --- Modals --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
        }

        .admin-box {
            background: #000;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border: 1px solid var(--accent);
        }

        .admin-box input, .admin-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            font-weight: 900;
            font-family: 'Orbitron';
            cursor: pointer;
        }

        /* --- Music --- */
        .music-player {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(10,10,10,0.8);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 50px;
            display: flex; align-items: center; gap: 10px;
            z-index: 99;
        }

        #yt-player { display: none; }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="member-counter">
            MEMBER: <span id="countNumber">00</span>
        </div>
        
        <div id="navAction">
            <button class="admin-btn" onclick="openLogin()">SYSTEM ADMIN</button>
        </div>
    </nav>

    <header class="hero">
        <h1 class="main-title">DEMO<span style="color:var(--accent)">WATSUT</span></h1>
        <p style="letter-spacing: 5px; font-size: 0.55rem; color: #444;">DATABASE ARCHIVE VERSION 2.0</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search data..." onkeyup="renderMembers()">
        </div>
        <div class="filter-group">
            <button class="f-btn active" onclick="setFilter('all', this)">ALL</button>
            <button class="f-btn" onclick="setFilter('DEMOWATSUT', this)">DEMOWATSUT</button>
            <button class="f-btn" onclick="setFilter('DEMO', this)">DEMO</button>
            <button class="f-btn" onclick="setFilter('WINTERFELL DEMO', this)">WINTERFELL</button>
            <button class="f-btn" onclick="setFilter('DOKKADON', this)">DOKKADON</button>
        </div>
    </div>

    <div class="grid-container" id="memberList"></div>

    <div id="loginModal" class="modal-overlay">
        <div class="admin-box">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px;">LOGIN</h2>
            <input type="text" id="user" placeholder="USER">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button class="primary-btn" onclick="handleLogin()">ACCESS</button>
            <button style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;" onclick="closeModals()">CLOSE</button>
        </div>
    </div>

    <div id="adminPanel" class="modal-overlay">
        <div class="admin-box">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px;">ENTRY LOG</h2>
            <input type="text" id="mName" placeholder="MEMBER NAME">
            <select id="mRole">
                <option value="DEMOWATSUT">DEMOWATSUT</option>
                <option value="DEMO">DEMO</option>
                <option value="WINTERFELL DEMO">WINTERFELL DEMO</option>
                <option value="DOKKADON">DOKKADON</option>
            </select>
            <input type="text" id="mImage" placeholder="IMAGE URL">
            <input type="text" id="mFB" placeholder="FACEBOOK URL">
            <button class="primary-btn" onclick="addMember()">UPLOAD</button>
            <hr style="border:0.5px solid #222; margin:15px 0;">
            <input type="text" id="musicId" placeholder="YOUTUBE ID">
            <button class="primary-btn" style="background:#fff;" onclick="updateMusic()">BGM UPDATE</button>
            <button style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;" onclick="handleLogout()">LOGOUT</button>
        </div>
    </div>

    <div class="music-player">
        <button onclick="toggleMusic()" style="background:var(--accent); border:none; width:25px; height:25px; border-radius:50%; cursor:pointer;">
            <i class="fas fa-play" id="playIcon" style="font-size: 0.6rem;"></i>
        </button>
        <span id="trackName" style="font-size: 0.5rem; font-family: 'Orbitron'; color:var(--accent);">MUSIC_ID: -</span>
    </div>

    <div id="yt-player"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;

        function openLogin() {
            if(isAdmin) document.getElementById('adminPanel').style.display = 'flex';
            else document.getElementById('loginModal').style.display = 'flex';
        }

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'demowatsut' && p === 'demo912') {
                isAdmin = true; closeModals();
                document.getElementById('adminPanel').style.display = 'flex';
                document.getElementById('navAction').innerHTML = `<button class="admin-btn" style="border-color:var(--accent); color:var(--accent)" onclick="openLogin()">ADMIN PANEL</button>`;
            } else { alert("Access Denied"); }
        }

        function handleLogout() { isAdmin = false; location.reload(); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        async function addMember() {
            const data = {
                name: document.getElementById('mName').value,
                role: document.getElementById('mRole').value,
                image: document.getElementById('mImage').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Missing Name");
            await db.ref('members').push(data);
            alert("Authorized!");
            document.getElementById('mName').value = '';
        }

        // ฟังข้อมูลจาก Firebase
        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            for(let id in data) allMembers.push({...data[id], id});
            renderMembers();
        });

        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const list = document.getElementById('memberList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const counter = document.getElementById('countNumber');

            // กรองข้อมูล
            const filtered = allMembers.filter(m => {
                const matchSearch = m.name.toLowerCase().includes(search);
                const matchRole = currentFilter === 'all' || m.role === currentFilter;
                return matchSearch && matchRole;
            });

            // อัปเดตจำนวนสมาชิคตามที่กรองอยู่จริง
            counter.innerText = filtered.length < 10 ? '0' + filtered.length : filtered.length;

            list.innerHTML = filtered.map(m => `
                <div class="card">
                    <img src="${m.image}" class="avatar" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="info">
                        <span class="role-tag">${m.role}</span>
                        <h3 style="font-family:'Orbitron'; font-size:0.9rem;">${m.name}</h3>
                        <a href="${m.facebook}" target="_blank" style="color:#444; font-size:0.8rem;"><i class="fab fa-facebook"></i></a>
                    </div>
                </div>
            `).join('');
        }

        // --- Music ---
        let player;
        function updateMusic() {
            const id = document.getElementById('musicId').value;
            if(id) db.ref('music').set({ id: id });
        }

        function onYouTubeIframeAPIReady() {
            db.ref('music').on('value', snap => {
                const m = snap.val() || { id: 'xy3AcmW0lrQ' };
                if(!player) {
                    player = new YT.Player('yt-player', {
                        height: '0', width: '0', videoId: m.id,
                        playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': m.id },
                        events: { 'onReady': e => e.target.setVolume(30) }
                    });
                } else { player.loadVideoById(m.id); }
                document.getElementById('trackName').innerText = "SID: " + m.id;
            });
        }

        function toggleMusic() {
            const icon = document.getElementById('playIcon');
            if (player.getPlayerState() === 1) { player.pauseVideo(); icon.className = "fas fa-play"; }
            else { player.playVideo(); icon.className = "fas fa-pause"; }
        }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);
        document.addEventListener('click', () => { if(player) player.playVideo(); }, { once: true });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* UI Elements */
        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 10000; }
        .notify { background: #202124; border-radius: 4px; padding: 12px 24px; color: #fff; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; margin-top: 10px; animation: slideUp 0.3s ease-out; min-width: 250px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 7000; backdrop-filter: blur(8px); }
        .custom-modal { background: #1a1c1e; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); }

        .top-nav { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .config-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; font-weight: bold; }

        .hero { padding: 160px 20px 60px; text-align: center; animation: slideUp 0.8s ease; }
        .hero img { max-width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--accent)); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(24px, 5vw, 50px); letter-spacing: 10px; color: var(--accent); }

        /* Member Grid */
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; transition: var(--transition); }
        .member-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .m-avatar { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .m-info h3 { font-family: 'Orbitron'; font-size: 14px; color: var(--accent); }
        .m-info p { font-size: 11px; opacity: 0.6; text-transform: uppercase; }

        /* Admin Panel */
        .admin-panel { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 6000; overflow-y: auto; padding: 40px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .admin-card { background: #141414; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; margin-bottom: 12px; font-family: 'Inter'; }
        label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 5px; font-family: 'Orbitron'; }
        
        .btn-save { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .btn-edit { background: #444; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .btn-del { background: #ff4444; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; border: none; }

        .music-ctrl { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <div id="yt-player-container"><div id="player"></div></div>

    <div id="loginModal" class="modal-overlay">
        <div class="custom-modal">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px; text-align: center;">ADMIN LOGIN</h2>
            <label>USERNAME</label><input type="text" id="loginUser">
            <label>PASSWORD</label><input type="password" id="loginPass">
            <button class="config-btn" style="width:100%; padding:12px;" onclick="attemptLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px;">
            MEMBERS: <span id="countNum" style="color:var(--accent)">0</span>
        </div>
        <button class="config-btn" onclick="openModal('loginModal')"><i class="fa-solid fa-shield-halved"></i> ADMIN</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:10px; opacity:0.5; letter-spacing:5px;">MEMBER ROLE SYSTEM</p>
    </header>

    <div id="memberList" class="member-grid"></div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 30px;">
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">ADMIN DASHBOARD</h2>
            <button class="config-btn" style="background:#ff4444; color:#fff;" onclick="logoutAdmin()">CLOSE PANEL</button>
        </div>

        <div class="admin-grid">
            <div class="admin-card" style="grid-column: span 1;">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-user-plus"></i> ADD/EDIT MEMBER</h3>
                <input type="hidden" id="editMemberKey">
                <label>MEMBER NAME</label><input type="text" id="mName" placeholder="ชื่อสมาชิก">
                <label>ROLE</label>
                <select id="mRoleSelect"><option value="">Select Role</option></select>
                <label>AVATAR URL</label><input type="text" id="mImg" placeholder="ลิ้งค์รูปภาพ">
                <button class="btn-save" style="background:var(--accent);" id="btnMemberAction" onclick="saveMember()">ADD MEMBER</button>
                <button class="btn-save" style="background:#555; margin-top:5px; display:none;" id="btnCancelEdit" onclick="resetMemberForm()">CANCEL EDIT</button>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-users-gear"></i> MANAGE LIST</h3>
                <div id="adminMemberList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-gears"></i> SITE CONFIG</h3>
                <label>SITE NAME</label><input type="text" id="configSiteName">
                <label>LOGO URL</label><input type="text" id="configLogoUrl">
                <button class="btn-save" style="background:var(--accent);" onclick="saveConfig()">SAVE SITE</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player;
        let musicData = { id: 'PAMYc_MkqkM', start: 40 };

        // --- Music System ---
        function onYouTubeIframeAPIReady() {
            db.ref('music').on('value', snap => {
                const d = snap.val();
                if(d && player) {
                    player.loadVideoById({ videoId: d.id, startSeconds: parseInt(d.start) });
                    player.pauseVideo();
                } else if(d) {
                    player = new YT.Player('player', {
                        height: '0', width: '0', videoId: d.id,
                        playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': d.id, 'start': parseInt(d.start) },
                    });
                }
            });
        }

        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            if(!player) return;
            if(player.getPlayerState() === 1) { player.pauseVideo(); icon.className = 'fa-solid fa-play'; } 
            else { player.playVideo(); icon.className = 'fa-solid fa-pause'; showNotify("MUSIC STARTED"); }
        }

        // --- Member CRUD Logic ---
        function saveMember() {
            const name = document.getElementById('mName').value;
            const role = document.getElementById('mRoleSelect').value;
            const img = document.getElementById('mImg').value;
            const key = document.getElementById('editMemberKey').value;

            if(!name || !role) return showNotify("PLEASE FILL NAME & ROLE");

            const data = { name, role, img: img || 'https://placehold.co/100x100/111/white?text=User' };

            if(key) {
                db.ref('members').child(key).update(data).then(() => {
                    showNotify("MEMBER UPDATED");
                    resetMemberForm();
                });
            } else {
                db.ref('members').push(data).then(() => {
                    showNotify("MEMBER ADDED");
                    resetMemberForm();
                });
            }
        }

        function editMember(key, name, role, img) {
            document.getElementById('editMemberKey').value = key;
            document.getElementById('mName').value = name;
            document.getElementById('mRoleSelect').value = role;
            document.getElementById('mImg').value = img;
            document.getElementById('btnMemberAction').innerText = "UPDATE MEMBER";
            document.getElementById('btnCancelEdit').style.display = "block";
        }

        function resetMemberForm() {
            document.getElementById('editMemberKey').value = "";
            document.getElementById('mName').value = "";
            document.getElementById('mImg').value = "";
            document.getElementById('btnMemberAction').innerText = "ADD MEMBER";
            document.getElementById('btnCancelEdit').style.display = "none";
        }

        // --- Real-time Data Sync ---
        db.ref('members').on('value', snap => {
            const members = snap.val() || {};
            const keys = Object.keys(members);
            document.getElementById('countNum').innerText = keys.length;

            // Update Member Grid (Public View)
            document.getElementById('memberList').innerHTML = keys.map(id => `
                <div class="member-card">
                    <img src="${members[id].img}" class="m-avatar">
                    <div class="m-info">
                        <h3>${members[id].name}</h3>
                        <p>${members[id].role}</p>
                    </div>
                </div>
            `).join('');

            // Update Admin Manage List
            document.getElementById('adminMemberList').innerHTML = keys.map(id => `
                <div style="display:flex; align-items:center; gap:10px; background:#000; padding:10px; margin-bottom:8px; border-radius:8px; border:1px solid #222;">
                    <img src="${members[id].img}" style="width:30px; height:30px; border-radius:50%;">
                    <div style="flex:1; font-size:12px;"><b>${members[id].name}</b></div>
                    <button class="btn-edit" onclick="editMember('${id}', '${members[id].name}', '${members[id].role}', '${members[id].img}')">EDIT</button>
                    <button class="btn-del" onclick="db.ref('members').child('${id}').remove()">DEL</button>
                </div>
            `).join('');
        });

        // Sync Roles to Dropdown
        db.ref('roles').on('value', snap => {
            const roles = snap.val() || {};
            const select = document.getElementById('mRoleSelect');
            select.innerHTML = '<option value="">Select Role</option>' + Object.values(roles).map(r => `
                <option value="${r.name}">${r.name}</option>
            `).join('');
        });

        // --- Utility Functions ---
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                closeModal('loginModal');
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function showNotify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notify';
            toast.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--accent)"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function saveConfig() {
            const name = document.getElementById('configSiteName').value;
            const logo = document.getElementById('configLogoUrl').value;
            db.ref('config').update({ name, logo }).then(() => showNotify("CONFIG SAVED"));
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logoutAdmin() { location.reload(); }

        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteLogo').src = d.logo || '';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Smooth Transitions */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Member Count Left Top */
        .member-count {
            position: fixed; top: 25px; left: 25px; z-index: 101;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px;
            background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px;
            backdrop-filter: blur(10px); border: 1px solid var(--border);
        }

        .top-nav {
            padding: 20px 5%; display: flex; justify-content: flex-end; gap: 25px;
            position: fixed; width: 100%; z-index: 100; transition: var(--transition);
        }

        .nav-btn { 
            color: #fff; text-decoration: none; cursor: pointer; font-size: 0.65rem; 
            font-weight: 700; opacity: 0.5; transition: var(--transition);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .nav-btn:hover { opacity: 1; text-shadow: 0 0 10px #fff; }

        .hero-section { text-align: center; padding: 150px 20px 60px; }
        
        /* Floating Logo Logic */
        .main-logo { transition: width 0.5s ease, transform 0.5s ease; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
        .logo-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .hero-title { font-family: 'Orbitron'; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 15px; text-transform: uppercase; margin-top: 20px; }

        .search-box input { 
            width: 100%; max-width: 400px; padding: 15px 25px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none;
            transition: var(--transition); margin: 40px auto; display: block; text-align: center;
        }
        .search-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }

        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 40px 5%; max-width: 1400px; margin: 0 auto;
        }
        .member-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; 
            padding: 20px; display: flex; align-items: center; gap: 15px; transition: var(--transition);
        }
        .member-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
        .avatar-wrapper { width: 65px; height: 65px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border); }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* Login Modal Styles */
        .login-box {
            background: #1a1a1a; width: 350px; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #222;
        }
        .login-box h2 { font-family: 'Inter'; font-weight: 500; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }
        .login-input-group { margin-bottom: 20px; text-align: left; }
        .login-input-group label { color: #666; font-size: 0.8rem; margin-bottom: 8px; display: block; }
        .login-input-group input { background: #222; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; width: 100%; }
        .btn-login { background: #ffc107; color: #000; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Music Player Right Bottom */
        .music-player {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            background: #fff; color: #000; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: var(--transition);
        }
        .music-player:hover { transform: scale(1.1); }

        .admin-window { background: #0d0d0d; width: 90%; max-width: 800px; height: 85vh; border-radius: 25px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; }
        .admin-body { padding: 30px; overflow-y: auto; flex: 1; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; margin: 15px 0; cursor: pointer; }
        input[type="checkbox"] { width: auto; }
        
        hr { border: 0; border-top: 1px solid #222; margin: 25px 0; }
    </style>
</head>
<body>

    <div class="member-count">MEMBER: <span id="countNum">0</span></div>

    <div class="music-player" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <nav class="top-nav">
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-lock"></i> ADMIN SYSTEM</a>
    </nav>

    <header class="hero-section fade-in">
        <img src="" alt="LOGO" class="main-logo" id="siteLogo">
        <h1 class="hero-title" id="siteNameDisplay">GHETTO</h1>
    </header>

    <div class="search-box fade-in">
        <input type="text" id="searchInput" placeholder="SEARCH MEMBER..." onkeyup="renderMembers()">
    </div>

    <div id="memberList" class="grid-container fade-in"></div>

    <div id="loginModal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
        <div class="login-box">
            <h2>ADMIN LOGIN</h2>
            <div class="login-input-group">
                <label>Email</label>
                <input type="text" id="adminUser" placeholder="Email">
            </div>
            <div class="login-input-group">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="Password">
            </div>
            <button class="btn-login" onclick="handleLogin()">LOGIN</button>
            <p onclick="closeModals()" style="text-align:center; margin-top:20px; cursor:pointer; font-size:0.7rem; opacity:0.5;">CANCEL</p>
        </div>
    </div>

    <div id="adminPanel" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
        <div class="admin-window">
            <div style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                <span style="font-family:'Orbitron'; font-size:0.8rem;">SYSTEM SETTINGS</span>
                <i class="fa-solid fa-xmark" onclick="closeModals()" style="cursor:pointer;"></i>
            </div>
            <div class="admin-body">
                <h4 style="margin-bottom:15px; color:var(--accent);">WEB CONFIGURATION</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div><label>Site Name</label><input type="text" id="confName" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                    <div><label>Logo Width (px)</label><input type="number" id="confLogoSize" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                    <div style="grid-column: span 2;"><label>Logo URL</label><input type="text" id="confLogo" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                    <div style="grid-column: span 2;"><label>Favicon URL</label><input type="text" id="confFavicon" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                    <div style="grid-column: span 2;"><label>Music URL (MP3)</label><input type="text" id="confMusic" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                </div>

                <label class="toggle-container">
                    <input type="checkbox" id="confLogoAnim"> Enable Logo Floating Effect
                </label>

                <button onclick="saveConfig()" style="width:100%; padding:15px; background:white; color:black; border:none; border-radius:10px; font-weight:700; cursor:pointer; margin-top:15px;">UPDATE SETTINGS</button>
                
                <hr>
                <h4 style="margin-bottom:15px; color:var(--accent);">MANAGE MEMBERS</h4>
                <input type="hidden" id="editId">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <input type="text" id="mName" placeholder="Member Name" style="padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;">
                    <input type="text" id="mRole" placeholder="Role (e.g. LEADER)" style="padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;">
                    <input type="text" id="mImg" placeholder="Avatar URL" style="padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;" style="grid-column: span 2;">
                    <input type="text" id="mFB" placeholder="Facebook URL" style="padding:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;" style="grid-column: span 2;">
                </div>
                <button onclick="saveMember()" id="saveBtn" style="width:100%; padding:12px; background:#333; color:white; border:none; border-radius:10px; margin-top:15px; cursor:pointer;">ADD MEMBER</button>

                <div id="adminMemberList" style="margin-top:25px;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Initialize ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let siteConfig = {};
        let isAdmin = false;

        // --- Auth ---
        function openAdmin() {
            if(isAdmin) document.getElementById('adminPanel').style.display='flex';
            else document.getElementById('loginModal').style.display='flex';
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        
        function handleLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            // รหัสผ่านตามที่คุณต้องการ
            if((user === 'ghett' && pass === 'ghett9871')) {
                isAdmin = true;
                closeModals();
                openAdmin();
            } else { alert("WRONG CREDENTIALS"); }
        }

        // --- Config ---
        db.ref('config').on('value', snap => {
            const data = snap.val() || {};
            siteConfig = data;
            
            document.getElementById('siteNameDisplay').innerText = data.name || 'GHETTO';
            document.getElementById('pageTitle').innerText = data.name || 'GHETTO';
            
            const logo = document.getElementById('siteLogo');
            logo.src = data.logo || '';
            logo.style.width = (data.logoSize || 120) + 'px';
            logo.classList.toggle('logo-float', data.logoAnim);

            document.getElementById('favicon').href = data.favicon || '';
            document.getElementById('bgMusic').src = data.music || '';

            // Admin inputs
            document.getElementById('confName').value = data.name || '';
            document.getElementById('confLogo').value = data.logo || '';
            document.getElementById('confLogoSize').value = data.logoSize || 120;
            document.getElementById('confFavicon').value = data.favicon || '';
            document.getElementById('confMusic').value = data.music || '';
            document.getElementById('confLogoAnim').checked = data.logoAnim || false;
        });

        async function saveConfig() {
            const data = {
                name: document.getElementById('confName').value,
                logo: document.getElementById('confLogo').value,
                logoSize: document.getElementById('confLogoSize').value,
                favicon: document.getElementById('confFavicon').value,
                music: document.getElementById('confMusic').value,
                logoAnim: document.getElementById('confLogoAnim').checked
            };
            await db.ref('config').set(data);
            alert("CONFIG SAVED");
        }

        // --- Members ---
        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `
                    <div style="background:#111; padding:10px 15px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #222;">
                        <span style="font-size:0.8rem;">${m.name}</span>
                        <div>
                            <i class="fa-solid fa-pen" onclick="editMember('${id}')" style="cursor:pointer; margin-right:15px; color:#888;"></i>
                            <i class="fa-solid fa-trash" onclick="deleteMember('${id}')" style="cursor:pointer; color:#ff4444;"></i>
                        </div>
                    </div>
                `;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
        });

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => m.name.toLowerCase().includes(search));
            
            document.getElementById('memberList').innerHTML = filtered.map(m => `
                <div class="member-card">
                    <div class="avatar-wrapper"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div>
                        <h4 style="font-size:0.9rem; letter-spacing:1px;">${m.name}</h4>
                        <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                            <span style="font-size:0.6rem; color:#666; font-weight:700;">${m.role || 'MEMBER'}</span>
                            <a href="${m.facebook}" target="_blank" style="color:#1877f2; font-size:0.8rem;"><i class="fa-brands fa-facebook"></i></a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('mName').value,
                role: document.getElementById('mRole').value || 'MEMBER',
                image: document.getElementById('mImg').value || '',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return;
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
        }

        function editMember(id) {
            const m = allMembers.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mRole').value = m.role;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
        }

        async function deleteMember(id) { if(confirm("Delete?")) await db.ref('members/'+id).remove(); }
        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.getElementById('saveBtn').innerText = "ADD MEMBER";
        }

        // --- Music ---
        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const icon = document.getElementById('musicIcon');
            if(audio.paused) { audio.play(); icon.className = 'fa-solid fa-pause'; }
            else { audio.pause(); icon.className = 'fa-solid fa-play'; }
        }
    </script>
</body>
</html>

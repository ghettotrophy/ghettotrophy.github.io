<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107; /* สีเหลืองหลักจากรูป */
            --bg: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- Header & Navigation --- */
        .top-nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .db-badge {
            font-family: 'Orbitron';
            font-size: 10px;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .config-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 11px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: var(--transition);
        }

        .config-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* --- Hero Section --- */
        .hero {
            padding: 120px 20px 40px;
            text-align: center;
            animation: reveal 1s ease;
        }

        .hero img { max-width: 280px; margin-bottom: 20px; transition: var(--transition); }
        .hero h1 { 
            font-family: 'Orbitron'; 
            font-size: 50px; 
            letter-spacing: 15px; 
            margin-bottom: 10px;
            font-weight: 700;
        }
        .hero p { opacity: 0.6; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; }

        /* --- Search & Filter --- */
        .filter-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-bottom: 50px;
        }

        .search-wrapper { width: 100%; max-width: 500px; position: relative; }
        #searchInput {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 30px;
            color: #fff;
            font-family: 'Inter';
            outline: none;
            transition: var(--transition);
            text-align: center;
        }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(255,193,7,0.1); }

        .category-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cat-btn {
            background: transparent;
            border: 1px solid #222;
            color: #888;
            padding: 10px 25px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- Member Grid --- */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 0 10% 100px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            animation: reveal 0.6s ease backwards;
        }

        .member-card:hover {
            transform: translateY(-5px);
            border-color: #444;
            background: #161616;
        }

        .avatar {
            width: 70px; height: 70px;
            border-radius: 14px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .m-info h3 { font-family: 'Orbitron'; font-size: 16px; margin-bottom: 4px; }
        .m-info p { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .m-info .social { margin-top: 8px; font-size: 14px; opacity: 0.3; transition: 0.3s; }
        .member-card:hover .social { opacity: 1; color: var(--accent); }

        /* --- Modals (Admin Login) --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }

        .login-box {
            background: #111;
            padding: 40px;
            border-radius: 24px;
            width: 100%; max-width: 400px;
            border: 1px solid #222;
            text-align: center;
            animation: reveal 0.4s ease;
        }

        .login-box h2 { font-family: 'Orbitron'; margin-bottom: 30px; letter-spacing: 2px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; opacity: 0.5; margin-bottom: 8px; margin-left: 10px; }
        .login-box input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        .login-btn {
            width: 100%;
            background: var(--accent);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .login-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* --- Music Controller --- */
        .music-ctrl {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px;
            background: #fff; color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
            z-index: 100;
        }
        .music-ctrl:hover { transform: scale(1.1); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="db-badge">DATABASE: <span id="countNum">0</span></div>
        <button class="config-btn" onclick="openAdmin()"><i class="fa-solid fa-gear"></i> CONFIG</button>
    </nav>

    <header class="hero">
        <img src="https://i.imgur.com/your-logo-here.png" alt="" id="siteLogo" onerror="this.style.display='none'">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay">NOT A PERFECT GANG BUT TRY TO BE THE BEST.</p>
    </header>

    <section class="filter-container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="SEARCH MEMBER..." onkeyup="renderMembers()">
        </div>
        
        <div class="category-grid" id="categoryGrid">
            <button class="cat-btn active" onclick="filterCat('ALL')">ALL</button>
            </div>
    </section>

    <div id="memberList" class="member-grid">
        </div>

    <div id="loginModal" class="modal">
        <div class="login-box">
            <h2>ADMIN LOGIN</h2>
            <div class="input-group">
                <label>Email / Username</label>
                <input type="text" id="adminUser">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPass">
            </div>
            <button class="login-btn" onclick="handleLogin()">LOGIN</button>
            <p onclick="closeModals()" style="margin-top:20px; font-size:11px; opacity:0.3; cursor:pointer;">CANCEL</p>
        </div>
    </div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [], siteConfig = {}, currentCat = 'ALL';

        // --- Auth ---
        function openAdmin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        
        function handleLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(pass === 'ghett9871') { // รหัสผ่านเดิมของคุณ
                window.location.href = "admin.html"; // หรือเปิด Panel
            } else {
                alert("Wrong Password");
            }
        }

        // --- Data Handling ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {}; siteConfig = d;
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.desc || '';
            if(d.logo) document.getElementById('siteLogo').src = d.logo;
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
            
            // Build Categories
            const cats = d.categories ? d.categories.split(',') : [];
            let catHtml = `<button class="cat-btn ${currentCat==='ALL'?'active':''}" onclick="filterCat('ALL')">ALL</button>`;
            cats.forEach(c => {
                const name = c.trim().toUpperCase();
                catHtml += `<button class="cat-btn ${currentCat===name?'active':''}" onclick="filterCat('${name}')">${name}</button>`;
            });
            document.getElementById('categoryGrid').innerHTML = catHtml;
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            for(let id in data) allMembers.push({...data[id], id});
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
        });

        function filterCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('memberList');
            
            const filtered = allMembers.filter(m => {
                const matchSearch = m.name.toLowerCase().includes(search);
                const matchCat = currentCat === 'ALL' || (m.role && m.role.toUpperCase() === currentCat);
                return matchSearch && matchCat;
            });

            list.innerHTML = filtered.map((m, i) => `
                <div class="member-card" style="animation-delay: ${i * 0.05}s">
                    <img src="${m.image || 'https://via.placeholder.com/150'}" class="avatar">
                    <div class="m-info">
                        <h3>${m.name}</h3>
                        <p>${m.role || 'MEMBER'}</p>
                        <div class="social">
                            <i class="fa-brands fa-facebook"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleMusic() {
            const a = document.getElementById('bgMusic'), i = document.getElementById('musicIcon');
            if(a.paused) { a.play(); i.className = 'fa-solid fa-pause'; }
            else { a.pause(); i.className = 'fa-solid fa-play'; }
        }
    </script>
</body>
</html>

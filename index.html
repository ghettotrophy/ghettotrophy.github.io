<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #d4af37; /* สีทอง */
            --bg-dark: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --text-glow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Header & Logo --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand-logo-container {
            text-align: center;
            padding: 50px 0;
        }

        .main-logo {
            width: 120px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .brand-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-top: 10px;
            text-shadow: var(--text-glow);
        }

        .sub-title {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #888;
        }

        /* --- Search & Filter --- */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: white;
            outline: none;
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .btn-filter {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-filter.active, .btn-filter:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        /* --- Member Grid --- */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 50px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .member-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
        }

        .member-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .member-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .member-info h3 { margin: 0; font-size: 1.1rem; }
        .member-info p { margin: 5px 0 0; font-size: 0.8rem; color: #888; }
        .tag-member { background: #333; padding: 2px 10px; border-radius: 10px; font-size: 0.6rem; color: #fff; }

        /* --- Admin Panel Modal --- */
        #adminPanel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            padding: 50px;
            overflow-y: auto;
        }

        .admin-form {
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--accent);
        }

        .admin-form input, .admin-form select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
        }

        .close-admin { position: absolute; top: 20px; right: 40px; font-size: 2rem; cursor: pointer; }

        /* --- Music Player (Bottom) --- */
        .music-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        #yt-player { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>DEMOWATSUT PROJECT</div>
        <div>
            <span style="cursor:pointer; margin-right: 20px;" onclick="location.reload()"><i class="fas fa-users"></i> Members</span>
            <span style="cursor:pointer; color: var(--accent);" onclick="toggleAdmin()"><i class="fas fa-lock"></i> Admin</span>
        </div>
    </div>

    <div class="brand-logo-container">
        <img src="https://img1.pic.in.th/images/cgtlogo2.png" class="main-logo" alt="logo">
        <h1 class="brand-title">DEMOWATSUT</h1>
        <div class="sub-title">SINCE 2026</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="ค้นหารายชื่อสมาชิก..." onkeyup="searchMember(this.value)">
    </div>

    <div class="filter-buttons">
        <button class="btn-filter active">All</button>
        <button class="btn-filter">Leader</button>
        <button class="btn-filter">Member</button>
    </div>

    <div class="member-grid" id="memberList">
        <p style="text-align: center; grid-column: 1/-1;">กำลังโหลดข้อมูล...</p>
    </div>

    <div id="adminPanel">
        <span class="close-admin" onclick="toggleAdmin()">&times;</span>
        <div class="admin-form">
            <h2><i class="fas fa-user-plus"></i> เพิ่มสมาชิก</h2>
            <input type="text" id="mName" placeholder="ชื่อ (เช่น Aef Wellesley)">
            <input type="text" id="mRole" placeholder="ตำแหน่ง (เช่น Leader)">
            <input type="text" id="mImage" placeholder="URL รูปภาพ">
            <input type="text" id="mFB" placeholder="ลิงก์ Facebook">
            <button onclick="addMember()" style="width:100%; padding:10px; background:var(--accent); border:none; font-weight:bold; cursor:pointer;">บันทึกข้อมูล</button>
            
            <hr style="margin: 30px 0; border: 0.5px solid #333;">
            
            <h2><i class="fas fa-music"></i> ตั้งค่าเพลง (YouTube ID)</h2>
            <input type="text" id="musicId" placeholder="YouTube Video ID (เช่น xy3AcmW0lrQ)">
            <button onclick="updateMusic()" style="width:100%; padding:10px; background:#fff; border:none; font-weight:bold; cursor:pointer;">เปลี่ยนเพลง</button>
        </div>
    </div>

    <div class="music-bar">
        <img src="" id="trackCover" style="width:40px; height:40px; border-radius:5px; display:none;">
        <div>
            <div id="trackName" style="font-size: 0.7rem; font-weight: bold;">Loading Music...</div>
            <div style="font-size: 0.5rem; color: var(--accent);">NOW PLAYING</div>
        </div>
        <button onclick="toggleMusic()" id="playBtn" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-pause"></i></button>
    </div>

    <div id="yt-player"></div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = { 
            databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Toggle Admin Panel ---
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        // --- Add Member to Firebase ---
        function addMember() {
            const name = document.getElementById('mName').value;
            const role = document.getElementById('mRole').value;
            const img = document.getElementById('mImage').value || 'https://via.placeholder.com/150';
            const fb = document.getElementById('mFB').value;

            if(name && role) {
                db.ref('members').push({
                    name: name,
                    role: role,
                    image: img,
                    facebook: fb
                }).then(() => {
                    alert('เพิ่มสมาชิกสำเร็จ!');
                    toggleAdmin();
                });
            }
        }

        // --- Load Members from Firebase ---
        db.ref('members').on('value', snap => {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `
                    <div class="member-card">
                        <img src="${data[id].image}" class="member-avatar">
                        <div class="member-info">
                            <h3>${data[id].name}</h3>
                            <span class="tag-member">${data[id].role.toUpperCase()}</span>
                            <p><a href="${data[id].facebook}" target="_blank" style="color:#1877F2; text-decoration:none;"><i class="fab fa-facebook"></i> Facebook</a></p>
                        </div>
                    </div>
                `;
            }
        });

        // --- Music System ---
        var player;
        function updateMusic() {
            const id = document.getElementById('musicId').value;
            if(id) db.ref('music').set({ id: id });
        }

        function onYouTubeIframeAPIReady() {
            db.ref('music').on('value', snap => {
                const m = snap.val() || { id: 'xy3AcmW0lrQ' }; // Default song
                if(!player) {
                    player = new YT.Player('yt-player', {
                        height: '0', width: '0', videoId: m.id,
                        playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': m.id },
                        events: { 'onReady': (e) => {
                            e.target.setVolume(40);
                            document.getElementById('trackName').innerText = "TRACK: " + m.id;
                        }}
                    });
                } else {
                    player.loadVideoById(m.id);
                    document.getElementById('trackName').innerText = "TRACK: " + m.id;
                }
            });
        }

        function toggleMusic() {
            const icon = document.querySelector('#playBtn i');
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                icon.className = "fas fa-play";
            } else {
                player.playVideo();
                icon.className = "fas fa-pause";
            }
        }

        // Load YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.append(tag);

        // Click to play (Browser Policy)
        document.body.addEventListener('click', () => {
            if(player) player.playVideo();
        }, { once: true });

    </script>
</body>
</html>
